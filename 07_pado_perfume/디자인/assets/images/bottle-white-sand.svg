<!--
  PADO (파도) — 향수 보틀: WHITE SAND (흰 모래)
  용도: 3장 라인업 카드 + 2장 스토리 카드
  스타일: 미니멀 실루엣 + 크리스탈 하이라이트
  형태: 낮고 넓은 보틀 (모래사장의 수평선, 안정감 암시)
  컬러: 세이지 베이지 → 크리스탈 화이트 그라디언트 + 현무암 블랙 캡
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 360" width="240" height="360">
  <defs>
    <!-- 보틀 메인: 따뜻한 모래색 그라디언트 -->
    <linearGradient id="sandBottle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8A080;stop-opacity:1"/>
      <stop offset="45%" style="stop-color:#C9B99A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D4C6A8;stop-opacity:1"/>
    </linearGradient>

    <!-- 상단에서 내려오는 빛 반사 -->
    <linearGradient id="sandLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F7F5F2;stop-opacity:0.35"/>
      <stop offset="40%" style="stop-color:#F7F5F2;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#C9B99A;stop-opacity:0"/>
    </linearGradient>

    <!-- 유리 반사광 -->
    <linearGradient id="sandGlass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.4"/>
      <stop offset="15%" style="stop-color:#FFFFFF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>

    <!-- 캡: 현무암 블랙 (가장 어두운 대비) -->
    <linearGradient id="sandCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A1A1A;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#2D2D2D;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#222222;stop-opacity:1"/>
    </linearGradient>

    <!-- 그림자: 넓적한 보틀의 넓은 그림자 -->
    <radialGradient id="sandShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#2D2D2D;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#2D2D2D;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- 보틀 그림자 (넓게) -->
  <ellipse cx="120" cy="350" rx="75" ry="9" fill="url(#sandShadow)"/>

  <!--
    캡: 납작하고 넓은 캡 (모래사장 수평선 형태)
    WHITE SAND — 모래의 평평함, 안정감 표현
  -->
  <!-- 캡 하단 연결부 -->
  <rect x="82" y="82" width="76" height="10" rx="1" ry="1" fill="#1A1A1A"/>
  <!-- 캡 몸체: 납작하고 넓음 -->
  <rect x="70" y="48" width="100" height="38" rx="3" ry="3" fill="url(#sandCap)"/>
  <!-- 캡 상단 마감 -->
  <rect x="76" y="44" width="88" height="8" rx="3" ry="3" fill="#2D2D2D"/>
  <!-- 캡 상단면 (평면) -->
  <ellipse cx="120" cy="44" rx="44" ry="5" fill="#333333"/>
  <!-- 캡 하이라이트 라인 -->
  <line x1="74" y1="60" x2="166" y2="60" stroke="#555555" stroke-width="0.8" opacity="0.5"/>
  <!-- 캡 좌측 반사 -->
  <rect x="73" y="50" width="9" height="34" rx="2" ry="2" fill="#555555" opacity="0.2"/>

  <!--
    넥: 매우 짧은 목 (낮고 넓은 보틀 특성)
  -->
  <rect x="92" y="90" width="56" height="14" rx="1" ry="1" fill="#B8A080"/>
  <!-- 넥-바디 어깨선 -->
  <rect x="84" y="102" width="72" height="8" rx="1" ry="1" fill="#C9B99A"/>

  <!--
    보틀 바디: 낮고 넓은 직사각형
    WHITE SAND — 모래의 수평적 안정감
  -->
  <rect x="40" y="108" width="160" height="228" rx="5" ry="5" fill="url(#sandBottle)"/>

  <!-- 빛 반사 레이어 -->
  <rect x="40" y="108" width="160" height="228" rx="5" ry="5" fill="url(#sandLight)"/>

  <!-- 유리 반사광 -->
  <rect x="40" y="108" width="160" height="228" rx="5" ry="5" fill="url(#sandGlass)"/>

  <!--
    내용물 색상 암시:
    흰 모래 — 거의 무색 투명한 액체 (아주 연한 크림색)
  -->
  <rect x="46" y="180" width="148" height="148" rx="3" ry="3"
        fill="#F7F5F2" opacity="0.08"/>

  <!--
    라벨 영역: 낮고 넓은 직사각 라벨
    WHITE SAND 특유의 가로형 라벨
  -->
  <rect x="55" y="150" width="130" height="70" rx="2" ry="2"
        fill="#F7F5F2" opacity="0.12"
        stroke="#A89070" stroke-width="0.5" opacity="0.25"/>

  <!-- 라벨 안 장식선 (양쪽 여백) -->
  <line x1="65" y1="175" x2="175" y2="175" stroke="#A89070" stroke-width="0.4" opacity="0.3"/>
  <line x1="65" y1="195" x2="175" y2="195" stroke="#A89070" stroke-width="0.4" opacity="0.3"/>

  <!--
    보틀 바닥면: 넓고 묵직한 바닥
  -->
  <rect x="40" y="328" width="160" height="10" rx="3" ry="3"
        fill="#A89070" opacity="0.4"/>

  <!--
    엣지 반사선
  -->
  <line x1="195" y1="112" x2="195" y2="332" stroke="#FFFFFF" stroke-width="1.5" opacity="0.25"/>
  <line x1="44" y1="112" x2="44" y2="332" stroke="#8A7050" stroke-width="1" opacity="0.12"/>

  <!--
    바닥면 현무암 암시: 보틀 아랫부분 미묘한 어두움
    흰 모래 위에 놓인 현무암 그림자 효과
  -->
  <rect x="40" y="300" width="160" height="40" rx="3" ry="3"
        fill="#2D2D2D" opacity="0.04"/>
</svg>
