<!--
  PADO (파도) — 브랜드 로고타입
  스타일: 산세리프 기반 / 자간 넓게 / 미니멀 워드마크
  적용: 1장 메인 헤드라인, 3장 브랜드 표시, 모든 카드 일관 적용
  컬러 버전: 화이트 (다크 배경용) — CSS color로 재색칠 가능한 path 구조

  폰트 기반: Raleway/Josefin Sans 스타일 (균일한 획 두께, 기하학적 산세리프)
  디자이너 노트: 실제 HTML에서는 웹폰트로 렌더링. 이 SVG는 벡터 폴백용.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <!-- 화이트 to 세이지베이지: 다크 배경 위 로고용 -->
    <linearGradient id="logoWhite" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F7F5F2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E8E3D8;stop-opacity:1"/>
    </linearGradient>

    <!-- 딥 오션 블루: 라이트 배경 위 로고용 -->
    <linearGradient id="logoDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1B4965;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D2137;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!--
    "PADO" 워드마크 — 기하학적 산세리프 직접 패스 제작
    자간: 넓게 (각 글자 간격 24px)
    획 두께: 균일 4px (Josefin Sans 계열 특성)
    전체 너비: 약 240px / 높이: 52px
    시작 X: 40px (좌우 여백 균등)
  -->

  <!-- ═══ P 글자 ═══ -->
  <!-- P 세로선 (왼쪽 수직 획) -->
  <rect x="40" y="14" width="4" height="52" fill="url(#logoWhite)"/>
  <!-- P 상단 가로선 (상단 수평 획) -->
  <rect x="40" y="14" width="28" height="4" fill="url(#logoWhite)"/>
  <!-- P 중간 가로선 (가운데 수평 획) -->
  <rect x="40" y="36" width="28" height="4" fill="url(#logoWhite)"/>
  <!-- P 우측 세로선 (반원 대신 직각 처리 — 기하학적 스타일) -->
  <rect x="64" y="14" width="4" height="26" fill="url(#logoWhite)"/>

  <!-- ═══ A 글자 (X:96) ═══ -->
  <!-- A 왼쪽 사선 -->
  <polygon points="96,66 110,14 114,14 100,66" fill="url(#logoWhite)"/>
  <!-- A 오른쪽 사선 -->
  <polygon points="124,66 110,14 114,14 128,66" fill="url(#logoWhite)"/>
  <!-- A 중간 가로선 -->
  <rect x="101" y="40" width="22" height="4" fill="url(#logoWhite)"/>

  <!-- ═══ D 글자 (X:152) ═══ -->
  <!-- D 세로선 (왼쪽 수직 획) -->
  <rect x="152" y="14" width="4" height="52" fill="url(#logoWhite)"/>
  <!-- D 상단 가로선 -->
  <rect x="152" y="14" width="22" height="4" fill="url(#logoWhite)"/>
  <!-- D 하단 가로선 -->
  <rect x="152" y="62" width="22" height="4" fill="url(#logoWhite)"/>
  <!-- D 오른쪽 세로선 (직각 처리) -->
  <rect x="170" y="14" width="4" height="52" fill="url(#logoWhite)"/>
  <!-- D 우측 마감 (살짝 라운드 느낌의 수직선) -->
  <rect x="174" y="22" width="4" height="36" fill="url(#logoWhite)" opacity="0.6"/>

  <!-- ═══ O 글자 (X:208) ═══ -->
  <!-- O 상단 가로선 -->
  <rect x="208" y="14" width="32" height="4" fill="url(#logoWhite)"/>
  <!-- O 하단 가로선 -->
  <rect x="208" y="62" width="32" height="4" fill="url(#logoWhite)"/>
  <!-- O 왼쪽 세로선 -->
  <rect x="208" y="14" width="4" height="52" fill="url(#logoWhite)"/>
  <!-- O 오른쪽 세로선 -->
  <rect x="236" y="14" width="4" height="52" fill="url(#logoWhite)"/>

  <!--
    서브 텍스트: "JEJU NICHE PERFUME"
    로고 하단에 아주 작게, 자간 최대로 넓혀
    실제 HTML 렌더링에서 웹폰트로 대체됨
  -->
  <!-- 서브 텍스트 영역 — 하단 구분선 -->
  <line x1="40" y1="74" x2="280" y2="74" stroke="url(#logoWhite)" stroke-width="0.5" opacity="0.3"/>
</svg>
