<!--
  PADO (파도) — 데코 요소: 라인 액센트
  용도: 브랜드명 아래 장식선, 섹션 시작 표시선
  스타일: 얇은 수평선 — 프리미엄 브랜드 표준 언더라인
  크기: 60×2px (실제 사용 시 CSS로 너비 조절)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 2" width="60" height="2">
  <!--
    중앙에서 양쪽으로 페이드: 선의 끝이 자연스럽게 사라짐
    직선보다 고급스러운 느낌
  -->
  <defs>
    <linearGradient id="lineAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9B99A;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#C9B99A;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#C9B99A;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#C9B99A;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#C9B99A;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <line x1="0" y1="1" x2="60" y2="1" stroke="url(#lineAccent)" stroke-width="1"/>
</svg>
