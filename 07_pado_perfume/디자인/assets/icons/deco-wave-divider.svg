<!--
  PADO (파도) — 데코 요소: 파도 구분선
  용도: 카드 내 섹션 구분, 텍스트 블록 전후 장식
  스타일: 미니멀 파도 곡선 — 실제 파도의 단면이 아닌 '물결의 기억'
  컬러: 다용도 (화이트/베이지/블루 CSS color로 재색칠)
  크기: 420×24px (카드 폭의 40% 정도 사용 권장)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 24" width="420" height="24">
  <!--
    파도 구분선 3중 레이어:
    — 메인 파도 곡선 (가장 진하게)
    — 반복 파도 곡선 (중간 투명도)
    — 메아리 파도 곡선 (가장 연하게)
    세 줄이 겹쳐 깊이감 형성
  -->

  <!-- 메인 파도 곡선: 완전 불투명 -->
  <path d="M0 12 Q52.5 4 105 12 Q157.5 20 210 12 Q262.5 4 315 12 Q367.5 20 420 12"
        stroke="#F7F5F2" stroke-width="1.2" fill="none" opacity="1"/>

  <!-- 반복 파도 (위로 3px 이동): 50% 투명도 -->
  <path d="M0 9 Q52.5 1 105 9 Q157.5 17 210 9 Q262.5 1 315 9 Q367.5 17 420 9"
        stroke="#F7F5F2" stroke-width="0.6" fill="none" opacity="0.4"/>

  <!-- 메아리 파도 (아래로 4px 이동): 20% 투명도 -->
  <path d="M0 16 Q52.5 8 105 16 Q157.5 24 210 16 Q262.5 8 315 16 Q367.5 24 420 16"
        stroke="#F7F5F2" stroke-width="0.4" fill="none" opacity="0.2"/>
</svg>
