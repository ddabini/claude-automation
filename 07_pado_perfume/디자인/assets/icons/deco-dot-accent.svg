<!--
  PADO (파도) — 데코 요소: 점 액센트 (니치 퍼퓸 표준 장식)
  용도: 노트 구분점, 카피 사이 구분, 라인업 목록 불릿
  스타일: 작은 원형 점 — Byredo/Ffern 스타일 미니멀 포인트
  크기: 6×6px (단독 사용) / 반복 사용 시 간격 32px
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 6 6" width="6" height="6">
  <!-- 중앙 원형 점: 매우 작고 세련된 포인트 -->
  <circle cx="3" cy="3" r="2.5" fill="#C9B99A"/>
</svg>
