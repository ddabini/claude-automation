<!--
  PADO (파도) — 텍스처 오버레이: 파도·모래 복합 텍스처
  용도: 배경 이미지 위에 올리는 오버레이 레이어
  opacity: 10-20% 권장 (너무 강하면 이미지 덮임)
  적용 방식: position:absolute / mix-blend-mode:overlay 또는 multiply
  크기: 1080×1350px (카드뉴스 전체 크기)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <!--
      파도 패턴: 반복되는 S자 곡선
      실제 파도보다는 '파도의 흔적'이나 '조류' 느낌
    -->
    <pattern id="wavePattern" x="0" y="0" width="216" height="54"
             patternUnits="userSpaceOnUse">
      <!-- 파도 곡선 — 부드러운 S자 -->
      <path d="M0 27 Q27 10 54 27 Q81 44 108 27 Q135 10 162 27 Q189 44 216 27"
            stroke="#F7F5F2" stroke-width="0.8" fill="none" opacity="0.6"/>
      <!-- 반향 파도 — 살짝 아래 -->
      <path d="M0 35 Q27 18 54 35 Q81 52 108 35 Q135 18 162 35 Q189 52 216 35"
            stroke="#F7F5F2" stroke-width="0.4" fill="none" opacity="0.3"/>
    </pattern>

    <!--
      모래 그레인 패턴: 매우 작은 점들
      해변 모래의 거친 입자 느낌
    -->
    <pattern id="sandGrain" x="0" y="0" width="8" height="8"
             patternUnits="userSpaceOnUse">
      <!-- 랜덤한 위치의 작은 점들 -->
      <circle cx="2" cy="2" r="0.6" fill="#C9B99A" opacity="0.4"/>
      <circle cx="6" cy="5" r="0.5" fill="#C9B99A" opacity="0.3"/>
      <circle cx="4" cy="7" r="0.4" fill="#C9B99A" opacity="0.25"/>
      <circle cx="7" cy="1" r="0.5" fill="#C9B99A" opacity="0.3"/>
      <circle cx="1" cy="6" r="0.4" fill="#C9B99A" opacity="0.2"/>
    </pattern>

    <!--
      현무암 균열 패턴: 아주 가는 불규칙 선들
      제주 현무암 표면의 미세 균열
    -->
    <pattern id="basaltCrack" x="0" y="0" width="40" height="40"
             patternUnits="userSpaceOnUse">
      <path d="M5 8 L12 15 L8 22" stroke="#2D2D2D" stroke-width="0.4"
            fill="none" opacity="0.15"/>
      <path d="M25 3 L30 12 L26 18 L32 25" stroke="#2D2D2D" stroke-width="0.3"
            fill="none" opacity="0.12"/>
      <path d="M2 30 L10 35 L15 28" stroke="#2D2D2D" stroke-width="0.3"
            fill="none" opacity="0.1"/>
      <path d="M30 30 L36 38" stroke="#2D2D2D" stroke-width="0.4"
            fill="none" opacity="0.12"/>
    </pattern>
  </defs>

  <!--
    텍스처 적용 영역: 3구역으로 나눠 텍스처 변화
    상단 1/3: 파도 패턴 (바다)
    중단 1/3: 혼합
    하단 1/3: 모래 그레인 (해변)
  -->

  <!-- 상단 파도 텍스처 영역 -->
  <rect x="0" y="0" width="1080" height="500"
        fill="url(#wavePattern)" opacity="0.4"/>

  <!-- 중간 트랜지션: 파도 + 그레인 혼합 -->
  <rect x="0" y="400" width="1080" height="200"
        fill="url(#sandGrain)" opacity="0.3"/>
  <rect x="0" y="400" width="1080" height="200"
        fill="url(#wavePattern)" opacity="0.2"/>

  <!-- 하단 모래 텍스처 영역 -->
  <rect x="0" y="600" width="1080" height="650"
        fill="url(#sandGrain)" opacity="0.5"/>

  <!-- 하단 현무암 균열 텍스처 (아주 미묘하게) -->
  <rect x="0" y="1000" width="1080" height="350"
        fill="url(#basaltCrack)" opacity="0.6"/>
</svg>
