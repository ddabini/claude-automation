<!--
  PADO (파도) — 1장 배경: 딥 오션 블루 풀블리드
  용도: 브랜드 임팩트 카드 배경 (1080×1350px)
  톤: 서늘하고 깊은 제주 심해, 미드나이트 → 오션 블루 그라디언트
  레이아웃 존: 텍스트 영역은 중앙 수직 방향 배치
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <!--
      딥 오션 그라디언트: 상단 미드나이트 네이비 → 하단 딥 오션 블루
      탈색된 바다 느낌으로 완전 진한 색 대신 부드러운 전환
    -->
    <linearGradient id="oceanDepth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0D2137;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#142F4A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1B4965;stop-opacity:1"/>
    </linearGradient>

    <!--
      미묘한 빛 번짐 효과: 바다 위에서 보이는 수중 빛 패턴
      중앙 상단에서 퍼지는 터쿼이즈 빛
    -->
    <radialGradient id="lightBloom" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#5FA8D3;stop-opacity:0.08"/>
      <stop offset="60%" style="stop-color:#1B4965;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#0D2137;stop-opacity:0"/>
    </radialGradient>

    <!-- 하단 부드러운 밝기 올리기: 텍스트 가독성 보조 -->
    <radialGradient id="bottomGlow" cx="50%" cy="85%" r="45%">
      <stop offset="0%" style="stop-color:#F7F5F2;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#F7F5F2;stop-opacity:0"/>
    </radialGradient>

    <!-- 파도 노이즈 필터: 탈색된 바다 질감 표현 -->
    <filter id="oceanNoise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- 메인 배경: 딥 오션 그라디언트 -->
  <rect width="1080" height="1350" fill="url(#oceanDepth)"/>

  <!-- 빛 번짐 레이어 -->
  <rect width="1080" height="1350" fill="url(#lightBloom)"/>

  <!-- 하단 부드러운 광원 -->
  <rect width="1080" height="1350" fill="url(#bottomGlow)"/>

  <!--
    수평선 암시: 매우 미묘한 가로 선으로 바다와 하늘 경계 표현
    실제 선이 아닌 투명도로만 처리 (구분선X, 분위기O)
  -->
  <rect x="0" y="360" width="1080" height="1" fill="#5FA8D3" opacity="0.06"/>
  <rect x="0" y="361" width="1080" height="2" fill="#5FA8D3" opacity="0.03"/>

  <!--
    파도 결 텍스처 레이어: 매우 미묘한 수평 곡선들
    실제 파도가 아닌 '파도가 남긴 흔적' 느낌
  -->
  <!-- 파도 결 1 — 상단 -->
  <path d="M0 280 Q270 272 540 284 Q810 296 1080 280"
        stroke="#5FA8D3" stroke-width="1" fill="none" opacity="0.05"/>
  <path d="M0 310 Q270 300 540 314 Q810 328 1080 310"
        stroke="#5FA8D3" stroke-width="0.5" fill="none" opacity="0.04"/>

  <!-- 파도 결 2 — 중단 -->
  <path d="M0 680 Q270 668 540 682 Q810 696 1080 680"
        stroke="#5FA8D3" stroke-width="1.5" fill="none" opacity="0.06"/>
  <path d="M0 710 Q270 698 540 714 Q810 730 1080 710"
        stroke="#5FA8D3" stroke-width="0.5" fill="none" opacity="0.03"/>

  <!-- 파도 결 3 — 하단 -->
  <path d="M0 1050 Q270 1038 540 1054 Q810 1070 1080 1050"
        stroke="#C9B99A" stroke-width="1" fill="none" opacity="0.08"/>
  <path d="M0 1080 Q270 1066 540 1082 Q810 1098 1080 1080"
        stroke="#C9B99A" stroke-width="0.5" fill="none" opacity="0.04"/>

  <!--
    극히 미묘한 노이즈 질감: 완전 평평한 배경 방지
    투명도를 매우 낮게 설정해 인쇄물처럼 자연스러운 질감
  -->
  <rect width="1080" height="1350" fill="url(#oceanDepth)" opacity="0.15" filter="url(#oceanNoise)"/>
</svg>
