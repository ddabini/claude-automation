<!--
  PADO (파도) — 2장 배경: 크리스탈 화이트 + 현무암 텍스처 오버레이
  용도: 제품 스토리 카드 배경 (1080×1350px)
  톤: 자연광이 스며든 흰 모래, 오버익스포즈된 해변의 공기
  특징: 화이트 기반에 현무암 그레인 미묘하게 오버레이
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <!--
      크리스탈 화이트 기본 배경
      완전 흰색(#FFFFFF)이 아닌 따뜻한 크림화이트(#F7F5F2)
    -->
    <linearGradient id="crystalWhite" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F7F5F2;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#F2EFE9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EDE9E1;stop-opacity:1"/>
    </linearGradient>

    <!-- 자연광 입사 효과: 좌상단에서 들어오는 부드러운 빛 -->
    <radialGradient id="naturalLight" cx="20%" cy="15%" r="70%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#F7F5F2;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#F7F5F2;stop-opacity:0"/>
    </radialGradient>

    <!--
      현무암 그레인 텍스처 필터
      작은 점들로 현무암 표면의 거친 질감 암시
    -->
    <filter id="basaltGrain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4"
                    seed="42" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- 오버익스포즈 효과: 이미지가 살짝 날린 느낌 -->
    <filter id="overexpose">
      <feComponentTransfer>
        <feFuncR type="gamma" amplitude="1.05" exponent="0.9" offset="0.02"/>
        <feFuncG type="gamma" amplitude="1.05" exponent="0.9" offset="0.02"/>
        <feFuncB type="gamma" amplitude="1.02" exponent="0.95" offset="0.01"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- 메인 배경: 크리스탈 화이트 -->
  <rect width="1080" height="1350" fill="url(#crystalWhite)"/>

  <!-- 자연광 입사 레이어 -->
  <rect width="1080" height="1350" fill="url(#naturalLight)"/>

  <!--
    모래 결 패턴: 매우 가는 수평 선들로 해변 모래 표면 암시
    실제로 보이기보다는 '느껴지는' 수준의 투명도
  -->
  <!-- 모래 결 그룹 1 — 상단 영역 -->
  <line x1="0" y1="180" x2="1080" y2="183" stroke="#C9B99A" stroke-width="0.5" opacity="0.12"/>
  <line x1="0" y1="220" x2="1080" y2="218" stroke="#C9B99A" stroke-width="0.3" opacity="0.08"/>
  <line x1="0" y1="260" x2="1080" y2="264" stroke="#C9B99A" stroke-width="0.5" opacity="0.10"/>

  <!-- 모래 결 그룹 2 — 중단 영역 -->
  <line x1="0" y1="600" x2="1080" y2="597" stroke="#C9B99A" stroke-width="0.4" opacity="0.09"/>
  <line x1="0" y1="650" x2="1080" y2="654" stroke="#C9B99A" stroke-width="0.3" opacity="0.07"/>

  <!-- 모래 결 그룹 3 — 하단 영역 -->
  <line x1="0" y1="1050" x2="1080" y2="1048" stroke="#C9B99A" stroke-width="0.5" opacity="0.12"/>
  <line x1="0" y1="1100" x2="1080" y2="1103" stroke="#C9B99A" stroke-width="0.3" opacity="0.08"/>
  <line x1="0" y1="1150" x2="1080" y2="1147" stroke="#C9B99A" stroke-width="0.4" opacity="0.10"/>

  <!--
    현무암 흔적 — 화면 좌하단에 현무암 그림자 암시
    실제 현무암 형태가 아닌 어두운 얼룩으로만 표현
  -->
  <ellipse cx="150" cy="1200" rx="200" ry="80" fill="#2D2D2D" opacity="0.02"/>
  <ellipse cx="80" cy="1280" rx="120" ry="50" fill="#2D2D2D" opacity="0.015"/>

  <!-- 하단 1/3 영역 미묘한 어두움: 텍스트 블록 배치 공간 -->
  <rect x="0" y="900" width="1080" height="450"
        fill="#C9B99A" opacity="0.03"/>

  <!--
    그레인 질감 레이어: 인화지 같은 자연스러운 질감
    현무암 그레인 필터 적용, 아주 낮은 투명도
  -->
  <rect width="1080" height="1350" fill="#2D2D2D" opacity="0.04"
        filter="url(#basaltGrain)"/>
</svg>
