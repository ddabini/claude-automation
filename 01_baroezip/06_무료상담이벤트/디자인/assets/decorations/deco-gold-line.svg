<!-- 골드 수평 구분선 — 섹션 분리용 장식 라인 (800×2px) -->
<!-- 적용 위치: 헤드라인 위(y=180) / 서브 위(y=540) 두 곳에 배치 -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 800 2"
  width="800"
  height="2"
  role="img"
  aria-label="골드 구분선"
>
  <defs>
    <!-- 좌우 끝이 자연스럽게 페이드되는 골드 그라디언트 -->
    <linearGradient id="goldFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#C9A96E; stop-opacity:0"/>
      <stop offset="15%"  style="stop-color:#E8D5A3; stop-opacity:1"/>
      <stop offset="50%"  style="stop-color:#C9A96E; stop-opacity:1"/>
      <stop offset="85%"  style="stop-color:#E8D5A3; stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C9A96E; stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- 메인 골드 라인 (2px 높이) -->
  <rect x="0" y="0" width="800" height="2" fill="url(#goldFade)"/>
</svg>
