<!-- 좌상단 코너 프레임 장식 — 포스터 상단 좌측 모서리 골드 라인 (80×80px) -->
<!-- 적용 위치: 포스터 좌상단 (x=40, y=40) -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 80 80"
  width="80"
  height="80"
  role="img"
  aria-label="좌상단 골드 코너 장식"
>
  <defs>
    <!-- 코너에서 안쪽 끝으로 자연스럽게 페이드되는 골드 그라디언트 -->
    <linearGradient id="cornerGoldH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#C9A96E; stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C9A96E; stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="cornerGoldV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#C9A96E; stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C9A96E; stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- 가로 라인 (상단) — 왼쪽에서 오른쪽으로 페이드 아웃 -->
  <rect x="0" y="0" width="60" height="1.5" fill="url(#cornerGoldH)"/>

  <!-- 세로 라인 (좌측) — 위에서 아래로 페이드 아웃 -->
  <rect x="0" y="0" width="1.5" height="60" fill="url(#cornerGoldV)"/>

  <!-- 코너 교차점 강조 포인트 (3×3 사각형) -->
  <rect x="0" y="0" width="3" height="3" fill="#E8D5A3"/>
</svg>
