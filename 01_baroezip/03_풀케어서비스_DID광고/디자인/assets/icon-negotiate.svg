<!-- 협상 아이콘: 악수 + 말풍선(대화) 조합, 면채움 스타일 -->
<!-- 용도: DID 광고 서비스 소개 섹션 - 중개수수료 협상 항목 (200x200px) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 골드 메인 그라디언트 -->
    <linearGradient id="goldMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5A3"/>
      <stop offset="50%" style="stop-color:#C9A96E"/>
      <stop offset="100%" style="stop-color:#A8854A"/>
    </linearGradient>
    <!-- 골드 밝은 버전 -->
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6C4"/>
      <stop offset="100%" style="stop-color:#D4B97A"/>
    </linearGradient>
    <!-- 골드 어두운 버전 -->
    <linearGradient id="goldDark" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8A6A35"/>
      <stop offset="100%" style="stop-color:#C9A96E"/>
    </linearGradient>
    <!-- 피부색 계열: 손 표현용 -->
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574"/>
      <stop offset="100%" style="stop-color:#B8864F"/>
    </linearGradient>
    <!-- 그림자 효과 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#C9A96E" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 배경 원형 -->
  <circle cx="100" cy="100" r="90" fill="#0D1B2A" opacity="0.6"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#goldMain)" stroke-width="2.5" opacity="0.7"/>

  <!-- ===== 왼쪽 말풍선: 협상 제안 메시지 ===== -->
  <rect x="28" y="30" width="64" height="44" rx="12" fill="#1A3A5C"/>
  <rect x="28" y="30" width="64" height="44" rx="12" fill="none" stroke="url(#goldMain)" stroke-width="2.5"/>
  <!-- 말풍선 꼬리: 오른쪽 하단 -->
  <polygon points="75,74 90,85 65,74" fill="#1A3A5C"/>
  <polygon points="75,74 90,85 65,74" fill="none" stroke="url(#goldMain)" stroke-width="2" stroke-linejoin="round"/>
  <!-- 말풍선 내용: 가격표/원화 기호 -->
  <text x="60" y="56" font-family="sans-serif" font-size="22" font-weight="900" fill="url(#goldMain)" text-anchor="middle">₩</text>
  <!-- 아래줄: 내려가는 화살표 (가격 인하 협상) -->
  <text x="60" y="68" font-family="sans-serif" font-size="11" font-weight="700" fill="#C9A96E" text-anchor="middle">DOWN</text>

  <!-- ===== 오른쪽 말풍선: 응답 메시지 ===== -->
  <rect x="108" y="30" width="64" height="44" rx="12" fill="url(#goldMain)" opacity="0.15"/>
  <rect x="108" y="30" width="64" height="44" rx="12" fill="none" stroke="url(#goldMain)" stroke-width="2.5"/>
  <!-- 말풍선 꼬리: 왼쪽 하단 -->
  <polygon points="125,74 110,85 135,74" fill="url(#goldMain)" opacity="0.15"/>
  <polygon points="125,74 110,85 135,74" fill="none" stroke="url(#goldMain)" stroke-width="2" stroke-linejoin="round"/>
  <!-- 말풍선 내용: 체크 표시 (동의/OK) -->
  <path d="M128,47 L136,57 L150,38" fill="none" stroke="url(#goldMain)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== 악수 메인 비주얼 ===== -->
  <!-- 왼손 팔 몸체 -->
  <path d="M24,148 L24,120 Q24,112 32,112 L72,112" fill="none" stroke="url(#goldMain)" stroke-width="18" stroke-linecap="round"/>
  <path d="M24,148 L24,120 Q24,112 32,112 L72,112" fill="none" stroke="url(#goldLight)" stroke-width="10" stroke-linecap="round" opacity="0.6"/>

  <!-- 오른손 팔 몸체 -->
  <path d="M176,148 L176,120 Q176,112 168,112 L128,112" fill="none" stroke="url(#goldMain)" stroke-width="18" stroke-linecap="round"/>
  <path d="M176,148 L176,120 Q176,112 168,112 L128,112" fill="none" stroke="url(#goldLight)" stroke-width="10" stroke-linecap="round" opacity="0.6"/>

  <!-- 왼손 손바닥 본체 -->
  <path d="M68,98 L68,118 Q68,124 74,124 L100,124 Q106,124 106,118 L106,98 Q106,92 100,92 L74,92 Q68,92 68,98 Z" fill="url(#goldMain)" filter="url(#glow)"/>
  <!-- 왼손 손가락 4개 -->
  <rect x="70" y="78" width="10" height="20" rx="5" fill="url(#goldMain)"/>
  <rect x="83" y="74" width="10" height="22" rx="5" fill="url(#goldMain)"/>
  <rect x="96" y="76" width="10" height="20" rx="5" fill="url(#goldMain)"/>
  <rect x="108" y="82" width="9" height="16" rx="4.5" fill="url(#goldMain)"/>
  <!-- 왼손 엄지손가락 -->
  <path d="M62,102 Q55,98 54,106 Q53,116 60,118" fill="url(#goldMain)"/>

  <!-- 오른손 손바닥 본체 -->
  <path d="M94,98 L94,118 Q94,124 100,124 L126,124 Q132,124 132,118 L132,98 Q132,92 126,92 L100,92 Q94,92 94,98 Z" fill="url(#goldMain)" filter="url(#glow)" opacity="0.9"/>
  <!-- 오른손 손가락 4개 -->
  <rect x="120" y="78" width="10" height="20" rx="5" fill="url(#goldDark)" opacity="0.9"/>
  <rect x="107" y="74" width="10" height="22" rx="5" fill="url(#goldDark)" opacity="0.9"/>
  <rect x="94" y="76" width="10" height="20" rx="5" fill="url(#goldDark)" opacity="0.9"/>
  <rect x="83" y="82" width="9" height="16" rx="4.5" fill="url(#goldDark)" opacity="0.9"/>
  <!-- 오른손 엄지손가락 -->
  <path d="M138,102 Q145,98 146,106 Q147,116 140,118" fill="url(#goldDark)" opacity="0.9"/>

  <!-- 악수 중앙 강조 원: 계약 포인트 -->
  <circle cx="100" cy="145" r="18" fill="#0D1B2A"/>
  <circle cx="100" cy="145" r="18" fill="none" stroke="url(#goldMain)" stroke-width="2.5"/>
  <!-- 중앙 별: 계약 완료 강조 -->
  <path d="M100,133 L103,141 L112,141 L105,147 L108,155 L100,150 L92,155 L95,147 L88,141 L97,141 Z" fill="url(#goldMain)"/>
</svg>
