<!-- 인테리어 연결 아이콘: 집 + 페인트롤러 + 색상 팔레트 조합, 면채움 스타일 -->
<!-- 용도: DID 광고 서비스 소개 섹션 - 인테리어 업체 연결 항목 (200x200px) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 골드 메인 그라디언트 -->
    <linearGradient id="goldMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5A3"/>
      <stop offset="50%" style="stop-color:#C9A96E"/>
      <stop offset="100%" style="stop-color:#A8854A"/>
    </linearGradient>
    <!-- 골드 밝은 버전 -->
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6C4"/>
      <stop offset="100%" style="stop-color:#D4B97A"/>
    </linearGradient>
    <!-- 골드 어두운 버전 -->
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A96E"/>
      <stop offset="100%" style="stop-color:#8A6A35"/>
    </linearGradient>
    <!-- 파란 벽: 인테리어 색상 표현 -->
    <linearGradient id="wallBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E4A7A"/>
      <stop offset="100%" style="stop-color:#0D2B4E"/>
    </linearGradient>
    <!-- 그림자 효과 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#C9A96E" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 배경 원형 -->
  <circle cx="100" cy="100" r="90" fill="#0D1B2A" opacity="0.6"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#goldMain)" stroke-width="2.5" opacity="0.7"/>

  <!-- ===== 집 구조 ===== -->
  <!-- 집 몸체: 메인 직사각형 -->
  <rect x="38" y="88" width="106" height="72" rx="4" fill="url(#wallBlue)"/>
  <!-- 집 몸체 테두리 -->
  <rect x="38" y="88" width="106" height="72" rx="4" fill="none" stroke="url(#goldMain)" stroke-width="2.5"/>

  <!-- 지붕: 삼각형 형태 -->
  <polygon points="100,32 26,90 174,90" fill="url(#goldMain)" filter="url(#glow)"/>
  <!-- 지붕 하이라이트: 상단 밝은 부분 -->
  <polygon points="100,32 26,90 174,90" fill="url(#goldLight)" opacity="0.4"/>
  <!-- 지붕 테두리 -->
  <polygon points="100,32 26,90 174,90" fill="none" stroke="#A8854A" stroke-width="2"/>
  <!-- 지붕 꼭대기 장식: 다이아몬드 -->
  <polygon points="100,22 108,32 100,42 92,32" fill="url(#goldMain)" stroke="#A8854A" stroke-width="1.5"/>

  <!-- 집 문: 중앙 하단 -->
  <rect x="82" y="120" width="36" height="40" rx="4" fill="#0A1520"/>
  <rect x="82" y="120" width="36" height="40" rx="4" fill="none" stroke="url(#goldMain)" stroke-width="2"/>
  <!-- 문 아치 장식 -->
  <path d="M82,124 Q100,112 118,124" fill="url(#goldMain)" opacity="0.3"/>
  <!-- 문 손잡이 -->
  <circle cx="115" cy="141" r="4" fill="url(#goldMain)"/>
  <circle cx="115" cy="141" r="2" fill="#0D1B2A"/>

  <!-- 왼쪽 창문 -->
  <rect x="46" y="98" width="28" height="24" rx="3" fill="#0A1520"/>
  <rect x="46" y="98" width="28" height="24" rx="3" fill="none" stroke="url(#goldMain)" stroke-width="2"/>
  <!-- 창문 십자 분할 -->
  <line x1="60" y1="98" x2="60" y2="122" stroke="url(#goldMain)" stroke-width="1.5"/>
  <line x1="46" y1="110" x2="74" y2="110" stroke="url(#goldMain)" stroke-width="1.5"/>

  <!-- 오른쪽 창문 -->
  <rect x="108" y="98" width="28" height="24" rx="3" fill="#0A1520"/>
  <rect x="108" y="98" width="28" height="24" rx="3" fill="none" stroke="url(#goldMain)" stroke-width="2"/>
  <line x1="122" y1="98" x2="122" y2="122" stroke="url(#goldMain)" stroke-width="1.5"/>
  <line x1="108" y1="110" x2="136" y2="110" stroke="url(#goldMain)" stroke-width="1.5"/>

  <!-- ===== 페인트롤러: 오른쪽 하단 ===== -->
  <!-- 롤러 핸들 막대 -->
  <rect x="128" y="128" width="7" height="46" rx="3.5" fill="url(#goldDark)" transform="rotate(-30, 131.5, 151)"/>
  <!-- 롤러 L자 연결 부분 -->
  <rect x="140" y="120" width="28" height="7" rx="3.5" fill="url(#goldMain)" transform="rotate(-30, 154, 123.5)"/>
  <!-- 페인트 롤러 헤드: 실린더 형태 -->
  <rect x="143" y="110" width="32" height="18" rx="9" fill="url(#goldMain)" filter="url(#glow)"/>
  <!-- 롤러 헤드 하이라이트 -->
  <rect x="143" y="110" width="32" height="8" rx="7" fill="url(#goldLight)" opacity="0.7"/>
  <!-- 롤러 왼쪽 캡 -->
  <ellipse cx="143" cy="119" rx="5" ry="9" fill="#A8854A"/>
  <!-- 롤러 오른쪽 캡 -->
  <ellipse cx="175" cy="119" rx="5" ry="9" fill="#A8854A"/>

  <!-- 페인트 방울: 롤러에서 흘러내리는 효과 -->
  <ellipse cx="155" cy="132" rx="5" ry="7" fill="url(#goldMain)" opacity="0.7"/>
  <ellipse cx="165" cy="136" rx="4" ry="5" fill="url(#goldMain)" opacity="0.5"/>
</svg>
