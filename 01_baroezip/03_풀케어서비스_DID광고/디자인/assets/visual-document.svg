<!-- 등기권리증 비주얼: 부동산 소유권 이전 완료를 상징하는 공식 문서 -->
<!-- 용도: DID 광고 "등기권리증 수령까지" 섹션의 메인 비주얼 -->
<!-- 크기: 320x420px — 문서 비율 (세로형) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 420" width="320" height="420">
  <defs>
    <!-- 골드 메인 그라디언트 -->
    <linearGradient id="goldMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5A3"/>
      <stop offset="50%" style="stop-color:#C9A96E"/>
      <stop offset="100%" style="stop-color:#A8854A"/>
    </linearGradient>
    <!-- 골드 밝은 버전 -->
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6C4"/>
      <stop offset="100%" style="stop-color:#C9A96E"/>
    </linearGradient>
    <!-- 문서 본체 배경: 고급스러운 크림색 -->
    <linearGradient id="docBg" x1="0%" y1="0%" x2="5%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F; stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#0D1B2A; stop-opacity:0.95"/>
    </linearGradient>
    <!-- 문서 헤더 배경 -->
    <linearGradient id="headerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8854A"/>
      <stop offset="50%" style="stop-color:#C9A96E"/>
      <stop offset="100%" style="stop-color:#A8854A"/>
    </linearGradient>
    <!-- 관인/도장 효과 -->
    <radialGradient id="stampGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C9A96E; stop-opacity:0.4"/>
      <stop offset="70%" style="stop-color:#C9A96E; stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#C9A96E; stop-opacity:0"/>
    </radialGradient>
    <!-- 문서 그림자 효과 -->
    <filter id="docShadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="8" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <!-- 골드 빛 효과 -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#C9A96E" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 문서 그림자 레이어 (오프셋) -->
  <rect x="24" y="24" width="280" height="380" rx="10" fill="#000000" opacity="0.5"/>

  <!-- ===== 문서 본체 ===== -->
  <rect x="16" y="16" width="280" height="380" rx="10" fill="url(#docBg)" filter="url(#docShadow)"/>
  <!-- 문서 외곽 테두리 (골드 이중 테두리) -->
  <rect x="16" y="16" width="280" height="380" rx="10" fill="none" stroke="url(#goldMain)" stroke-width="3"/>
  <rect x="24" y="24" width="264" height="364" rx="7" fill="none" stroke="url(#goldMain)" stroke-width="1" opacity="0.4"/>

  <!-- ===== 문서 헤더 영역 ===== -->
  <rect x="16" y="16" width="280" height="80" rx="10" fill="url(#headerBg)"/>
  <!-- 헤더 하단 마감 -->
  <rect x="16" y="72" width="280" height="24" fill="url(#headerBg)"/>

  <!-- 헤더 제목: 등기권리증 -->
  <text x="156" y="46" font-family="'Noto Serif KR', 'KoPub Batang', serif"
        font-size="22" font-weight="900"
        fill="#0D1B2A" text-anchor="middle"
        letter-spacing="4">등기권리증</text>
  <!-- 헤더 부제목 -->
  <text x="156" y="70" font-family="'Noto Sans KR', sans-serif"
        font-size="11" font-weight="400"
        fill="#0D1B2A" text-anchor="middle"
        letter-spacing="2" opacity="0.7">CERTIFICATE OF REGISTERED TITLE</text>

  <!-- 헤더 좌우 관청 로고 자리: 원형 -->
  <circle cx="44" cy="52" r="20" fill="#0D1B2A" opacity="0.2"/>
  <circle cx="44" cy="52" r="20" fill="none" stroke="#0D1B2A" stroke-width="1.5" opacity="0.4"/>
  <text x="44" y="56" font-size="10" fill="#0D1B2A" text-anchor="middle" opacity="0.6" font-weight="700">법원</text>

  <circle cx="268" cy="52" r="20" fill="#0D1B2A" opacity="0.2"/>
  <circle cx="268" cy="52" r="20" fill="none" stroke="#0D1B2A" stroke-width="1.5" opacity="0.4"/>
  <text x="268" y="56" font-size="10" fill="#0D1B2A" text-anchor="middle" opacity="0.6" font-weight="700">등기</text>

  <!-- ===== 문서 본문 내용 영역 ===== -->
  <!-- 섹션 라벨: 부동산 표시 -->
  <rect x="32" y="112" width="100" height="18" rx="3" fill="url(#goldMain)" opacity="0.9"/>
  <text x="82" y="125" font-family="sans-serif" font-size="10" font-weight="700"
        fill="#0D1B2A" text-anchor="middle" letter-spacing="1">부동산의 표시</text>

  <!-- 내용 텍스트 라인들: 부동산 정보 -->
  <rect x="32" y="138" width="220" height="8" rx="4" fill="#C9A96E" opacity="0.6"/>
  <rect x="32" y="152" width="180" height="8" rx="4" fill="#C9A96E" opacity="0.5"/>
  <rect x="32" y="166" width="200" height="8" rx="4" fill="#C9A96E" opacity="0.55"/>
  <rect x="32" y="180" width="140" height="8" rx="4" fill="#C9A96E" opacity="0.4"/>

  <!-- 구분선 -->
  <line x1="32" y1="200" x2="288" y2="200" stroke="url(#goldMain)" stroke-width="1" opacity="0.5"/>

  <!-- 섹션 라벨: 소유자 -->
  <rect x="32" y="210" width="80" height="18" rx="3" fill="url(#goldMain)" opacity="0.9"/>
  <text x="72" y="223" font-family="sans-serif" font-size="10" font-weight="700"
        fill="#0D1B2A" text-anchor="middle" letter-spacing="1">소유자 표시</text>

  <!-- 소유자 정보 라인 -->
  <rect x="32" y="236" width="160" height="8" rx="4" fill="#C9A96E" opacity="0.55"/>
  <rect x="32" y="250" width="120" height="8" rx="4" fill="#C9A96E" opacity="0.45"/>
  <rect x="32" y="264" width="180" height="8" rx="4" fill="#C9A96E" opacity="0.5"/>

  <!-- 구분선 -->
  <line x1="32" y1="284" x2="288" y2="284" stroke="url(#goldMain)" stroke-width="1" opacity="0.5"/>

  <!-- 등기 완료 날짜 -->
  <text x="156" y="306" font-family="sans-serif" font-size="11" fill="#C9A96E"
        text-anchor="middle" opacity="0.8">20__ 년 __ 월 __ 일 등기</text>

  <!-- ===== 관인/도장 영역 ===== -->
  <!-- 관인 배경 원 -->
  <circle cx="220" cy="350" r="46" fill="url(#stampGrad)"/>
  <circle cx="220" cy="350" r="42" fill="none" stroke="#C9A96E" stroke-width="2.5" stroke-dasharray="4 2" opacity="0.7" filter="url(#goldGlow)"/>
  <circle cx="220" cy="350" r="34" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.5"/>
  <!-- 관인 중앙 텍스트 -->
  <text x="220" y="344" font-family="sans-serif" font-size="10" font-weight="700"
        fill="#C9A96E" text-anchor="middle" opacity="0.8">법원행정처</text>
  <text x="220" y="358" font-family="sans-serif" font-size="9"
        fill="#C9A96E" text-anchor="middle" opacity="0.7">등 기 관</text>

  <!-- ===== 체크 완료 배지: 우측 하단 코너 ===== -->
  <circle cx="270" cy="390" r="22" fill="url(#goldMain)" filter="url(#goldGlow)"/>
  <circle cx="270" cy="390" r="18" fill="#0D1B2A"/>
  <path d="M260,390 L266,398 L280,382"
        fill="none" stroke="url(#goldMain)" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== 배경 패턴: 보안 패턴 (기요쉐) ===== -->
  <!-- 가는 사선 패턴으로 공문서 느낌 -->
  <line x1="30" y1="310" x2="60" y2="280" stroke="#C9A96E" stroke-width="0.5" opacity="0.1"/>
  <line x1="50" y1="320" x2="80" y2="290" stroke="#C9A96E" stroke-width="0.5" opacity="0.1"/>
  <line x1="70" y1="330" x2="100" y2="300" stroke="#C9A96E" stroke-width="0.5" opacity="0.1"/>
  <line x1="90" y1="340" x2="120" y2="310" stroke="#C9A96E" stroke-width="0.5" opacity="0.1"/>
  <line x1="110" y1="350" x2="140" y2="320" stroke="#C9A96E" stroke-width="0.5" opacity="0.1"/>
  <line x1="130" y1="360" x2="160" y2="330" stroke="#C9A96E" stroke-width="0.5" opacity="0.1"/>
</svg>
