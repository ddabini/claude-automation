<!-- 골드 구분선 장식 요소: 섹션 간 구분에 사용, 면채움 다이아몬드 강조 -->
<!-- 용도: DID 광고 각 섹션 사이 구분선 (가로 전체 너비 사용) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 32" width="800" height="32">
  <defs>
    <!-- 왼쪽에서 중앙으로 진해지는 그라디언트 -->
    <linearGradient id="goldFadeL" x1="0" y1="0" x2="340" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="1"/>
    </linearGradient>
    <!-- 오른쪽으로 옅어지는 그라디언트 -->
    <linearGradient id="goldFadeR" x1="460" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/>
    </linearGradient>
    <!-- 중앙 밝은 골드 -->
    <linearGradient id="goldCenter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6C4"/>
      <stop offset="50%" style="stop-color:#C9A96E"/>
      <stop offset="100%" style="stop-color:#A8854A"/>
    </linearGradient>
  </defs>

  <!-- 왼쪽 라인: 투명에서 골드로 페이드인 -->
  <line x1="0" y1="16" x2="340" y2="16" stroke="url(#goldFadeL)" stroke-width="1.5"/>

  <!-- 좌측 작은 다이아몬드 장식 -->
  <rect x="356" y="12" width="8" height="8" rx="1" transform="rotate(45 360 16)" fill="#C9A96E" opacity="0.5"/>

  <!-- 중앙 큰 다이아몬드: 메인 장식 -->
  <rect x="390" y="8" width="16" height="16" rx="1.5" transform="rotate(45 398 16)" fill="url(#goldCenter)"/>
  <!-- 다이아몬드 중앙 내부 작은 원 -->
  <circle cx="398" cy="16" r="3" fill="#0D1B2A"/>

  <!-- 우측 작은 다이아몬드 장식 -->
  <rect x="424" y="12" width="8" height="8" rx="1" transform="rotate(45 428 16)" fill="#C9A96E" opacity="0.5"/>

  <!-- 오른쪽 라인: 골드에서 투명으로 페이드아웃 -->
  <line x1="460" y1="16" x2="800" y2="16" stroke="url(#goldFadeR)" stroke-width="1.5"/>
</svg>
