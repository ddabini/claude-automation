<!-- 세무사 상담 아이콘: 계산기 + 세금 문서 조합, 면채움 스타일 -->
<!-- 용도: DID 광고 서비스 소개 섹션 - 세무사 항목 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 골드 메인 그라디언트: 아이콘 본체에 사용 -->
    <linearGradient id="goldMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5A3"/>
      <stop offset="50%" style="stop-color:#C9A96E"/>
      <stop offset="100%" style="stop-color:#A8854A"/>
    </linearGradient>
    <!-- 골드 밝은 버전: 하이라이트에 사용 -->
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6C4"/>
      <stop offset="100%" style="stop-color:#E8D5A3"/>
    </linearGradient>
    <!-- 골드 어두운 버전: 그림자/깊이감에 사용 -->
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A96E"/>
      <stop offset="100%" style="stop-color:#8A6A35"/>
    </linearGradient>
    <!-- 아이콘 전체에 적용할 그림자 효과 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#C9A96E" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 배경 원형: 아이콘 전체를 감싸는 원 -->
  <circle cx="100" cy="100" r="90" fill="#0D1B2A" opacity="0.6"/>
  <!-- 배경 원형 테두리: 골드 링 -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#goldMain)" stroke-width="2.5" opacity="0.7"/>

  <!-- 문서 본체: 세금 신고서/계약서를 표현하는 직사각형 -->
  <rect x="55" y="38" width="72" height="90" rx="8" fill="url(#goldDark)" filter="url(#shadow)"/>
  <!-- 문서 상단 밝은 부분: 빛 반사 효과 -->
  <rect x="55" y="38" width="72" height="90" rx="8" fill="url(#goldMain)" opacity="0.9"/>
  <!-- 문서 접힌 모서리: 오른쪽 상단 삼각형으로 표현 -->
  <path d="M107 38 L127 58 L107 58 Z" fill="#8A6A35" opacity="0.8"/>
  <!-- 접힌 모서리 그림자 라인 -->
  <path d="M107 38 L127 58" fill="none" stroke="#0D1B2A" stroke-width="1.5"/>

  <!-- 문서 내용선 1: 텍스트 줄을 표현 -->
  <rect x="65" y="68" width="42" height="5" rx="2.5" fill="#0D1B2A" opacity="0.4"/>
  <!-- 문서 내용선 2 -->
  <rect x="65" y="80" width="50" height="5" rx="2.5" fill="#0D1B2A" opacity="0.4"/>
  <!-- 문서 내용선 3 -->
  <rect x="65" y="92" width="35" height="5" rx="2.5" fill="#0D1B2A" opacity="0.4"/>

  <!-- 계산기 본체: 문서 위에 겹쳐 놓인 계산기 -->
  <rect x="72" y="95" width="56" height="56" rx="10" fill="#1A2F45"/>
  <!-- 계산기 테두리: 골드 테두리로 강조 -->
  <rect x="72" y="95" width="56" height="56" rx="10" fill="none" stroke="url(#goldMain)" stroke-width="2.5"/>
  <!-- 계산기 화면 영역: 상단 디스플레이 -->
  <rect x="79" y="102" width="42" height="16" rx="4" fill="url(#goldLight)"/>
  <!-- 화면 안 숫자 표시: 세금 계산 결과를 암시 -->
  <rect x="95" y="106" width="20" height="8" rx="2" fill="#A8854A"/>

  <!-- 계산기 버튼들: 2x4 그리드 배치 -->
  <!-- 버튼 행 1 -->
  <rect x="80" y="123" width="13" height="10" rx="3" fill="url(#goldMain)"/>
  <rect x="96" y="123" width="13" height="10" rx="3" fill="url(#goldMain)"/>
  <rect x="112" y="123" width="13" height="10" rx="3" fill="url(#goldMain)" opacity="0.7"/>
  <!-- 버튼 행 2 -->
  <rect x="80" y="137" width="13" height="10" rx="3" fill="url(#goldMain)" opacity="0.8"/>
  <rect x="96" y="137" width="13" height="10" rx="3" fill="url(#goldMain)" opacity="0.8"/>
  <rect x="112" y="137" width="13" height="22" rx="3" fill="#C9A96E"/>

  <!-- 원화 기호: 한국 세금 상징 -->
  <text x="117" y="127.5" font-family="serif" font-size="7" font-weight="900" fill="#0D1B2A" text-anchor="middle">₩</text>

  <!-- 하단 세금 문서 강조 배지: 작은 원형 -->
  <circle cx="148" cy="148" r="16" fill="#0D1B2A"/>
  <circle cx="148" cy="148" r="16" fill="none" stroke="url(#goldMain)" stroke-width="2"/>
  <!-- % 기호: 세율/세금 개념 -->
  <text x="148" y="153" font-family="sans-serif" font-size="13" font-weight="900" fill="url(#goldMain)" text-anchor="middle">%</text>
</svg>
