<!-- 방패 + 체크마크 아이콘: 신뢰·보호·보증을 상징 -->
<!-- 용도: DID 광고 "검증된 전문가" "안전한 거래" 신뢰 강조 섹션 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 골드 메인 그라디언트 -->
    <linearGradient id="goldMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5A3"/>
      <stop offset="50%" style="stop-color:#C9A96E"/>
      <stop offset="100%" style="stop-color:#A8854A"/>
    </linearGradient>
    <!-- 골드 빛나는 효과: 방패 내부 -->
    <radialGradient id="goldGlow" cx="40%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#F5E6C4"/>
      <stop offset="60%" style="stop-color:#C9A96E"/>
      <stop offset="100%" style="stop-color:#8A6A35"/>
    </radialGradient>
    <!-- 방패 내부 배경 -->
    <linearGradient id="shieldInner" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3A5C"/>
      <stop offset="100%" style="stop-color:#0D1B2A"/>
    </linearGradient>
    <!-- 그림자 효과 -->
    <filter id="shieldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#C9A96E" flood-opacity="0.4"/>
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#C9A96E" flood-opacity="0.2"/>
    </filter>
    <!-- 체크마크 빛 효과 -->
    <filter id="checkGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#F5E6C4" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- 배경 원형 -->
  <circle cx="100" cy="100" r="90" fill="#0D1B2A" opacity="0.5"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#goldMain)" stroke-width="2" opacity="0.6"/>

  <!-- ===== 방패 외형: 헤럴드릭 클래식 방패 형태 ===== -->
  <!-- 방패 그림자/외곽 레이어 -->
  <path d="M100,22 L166,50 L166,110 Q166,162 100,182 Q34,162 34,110 L34,50 Z"
        fill="#8A6A35" filter="url(#shieldGlow)" opacity="0.6"/>
  <!-- 방패 메인 골드 테두리 -->
  <path d="M100,22 L166,50 L166,110 Q166,162 100,182 Q34,162 34,110 L34,50 Z"
        fill="url(#goldMain)"/>
  <!-- 방패 내부 채움: 다크 계열 -->
  <path d="M100,32 L158,56 L158,110 Q158,154 100,172 Q42,154 42,110 L42,56 Z"
        fill="url(#shieldInner)"/>
  <!-- 방패 내부 골드 테두리 (2겹 효과) -->
  <path d="M100,40 L150,62 L150,110 Q150,148 100,164 Q50,148 50,110 L50,62 Z"
        fill="none" stroke="url(#goldMain)" stroke-width="2" opacity="0.5"/>

  <!-- 방패 상단 중앙 장식: 골드 크라운 모양 -->
  <rect x="88" y="22" width="24" height="16" rx="3" fill="url(#goldMain)"/>
  <!-- 크라운 뾰족한 부분 3개 -->
  <polygon points="88,22 92,14 96,22" fill="url(#goldMain)"/>
  <polygon points="98,22 102,12 106,22" fill="url(#goldMain)"/>
  <polygon points="108,22 112,14 116,22" fill="url(#goldMain)"/>
  <!-- 크라운 보석 장식 -->
  <circle cx="92" cy="17" r="2.5" fill="#F5E6C4"/>
  <circle cx="100" cy="15" r="3" fill="#F5E6C4"/>
  <circle cx="108" cy="17" r="2.5" fill="#F5E6C4"/>

  <!-- ===== 체크마크: 방패 내부 중앙 ===== -->
  <!-- 체크 배경 원형 -->
  <circle cx="100" cy="108" r="38" fill="url(#goldMain)" opacity="0.12"/>
  <circle cx="100" cy="108" r="32" fill="none" stroke="url(#goldMain)" stroke-width="1.5" opacity="0.4"/>
  <!-- 메인 체크마크 -->
  <path d="M72,108 L88,126 L128,88"
        fill="none"
        stroke="url(#goldMain)"
        stroke-width="12"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#checkGlow)"/>
  <!-- 체크마크 내부 하이라이트 (밝은 선) -->
  <path d="M72,108 L88,126 L128,88"
        fill="none"
        stroke="#F5E6C4"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.8"/>

  <!-- 방패 하단 장식: 별 3개 -->
  <circle cx="85" cy="152" r="3.5" fill="url(#goldMain)"/>
  <circle cx="100" cy="158" r="4" fill="url(#goldMain)"/>
  <circle cx="115" cy="152" r="3.5" fill="url(#goldMain)"/>
</svg>
