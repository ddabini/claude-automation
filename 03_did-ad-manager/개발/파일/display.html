<!DOCTYPE html>
<html lang="ko">
<head>
  <!--
    ============================================================
    DID 디스플레이 페이지 (display.html) — Firebase 연동 버전
    역할: 4K 전체화면에서 광고 이미지/영상을 자동으로 롤링 재생
    연동: Firebase Realtime Database의 onValue 리스너로 실시간 동기화
          admin.html에서 변경 시 폴링 없이 즉시 반영
    ============================================================
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DID 디스플레이</title>

  <!-- Firebase SDK CDN (compat 버전 — admin.html과 동일하게 맞춤) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

  <style>
    /* ===== 기본 초기화 ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ===== 전체 화면: 검정 배경, 넘치는 내용 숨김 ===== */
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: sans-serif;
      /* 더블클릭 시 텍스트 선택 방지 (전체화면 전환 이벤트 방해 차단) */
      user-select: none;
      -webkit-user-select: none;
    }

    /* ===== 슬라이드쇼 컨테이너: 화면 전체를 꽉 채움 ===== */
    #slideshow-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    /* ===== 각 슬라이드 (이미지/영상을 담는 틀) ===== */
    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      /* 처음엔 완전히 투명하게 (보이지 않음) */
      opacity: 0;
      /* 위치 이동이나 크기 변화에 부드러운 애니메이션 적용 */
      transition: opacity 0.8s ease, transform 0.8s ease;
      /* 슬라이드가 쌓이는 순서 관리 */
      z-index: 1;
    }

    /* ===== 현재 보여지는 슬라이드 (완전히 보임) ===== */
    .slide.active {
      opacity: 1;
      z-index: 2;
      transform: translate(0, 0) scale(1);
    }

    /* ===== 이미지 슬라이드: 화면에 꽉 차게, 비율 유지 ===== */
    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* ===== 영상 슬라이드: 화면에 꽉 차게 ===== */
    .slide video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }

    /* ===== 소재가 없을 때 안내 화면 ===== */
    #empty-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      z-index: 100;
    }

    #empty-screen .icon { font-size: 80px; margin-bottom: 30px; opacity: 0.4; }
    #empty-screen h2 { font-size: 32px; font-weight: 300; opacity: 0.7; margin-bottom: 15px; letter-spacing: 2px; }
    #empty-screen p { font-size: 16px; opacity: 0.4; letter-spacing: 1px; }

    /* ===== 화면 하단 상태 표시줄 ===== */
    #status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 12px 24px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 50;
    }

    #status-bar.visible { opacity: 1; }

    /* ===== 로딩 화면 ===== */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      z-index: 200;
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ===== 로딩 애니메이션 점 3개 ===== */
    .loading-dots {
      display: inline-flex;
      gap: 8px;
      margin-left: 12px;
    }

    .loading-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fff;
      animation: bounce 1.2s infinite;
      opacity: 0.4;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-8px); opacity: 1; }
    }

    /* ===== 일시정지 아이콘 ===== */
    #pause-indicator {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 60px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 150;
      pointer-events: none;
    }

    #pause-indicator.visible { opacity: 1; }

    /* ===== 진행 표시 바 (화면 하단 얇은 줄) ===== */
    #progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 3px;
      background: rgba(255,255,255,0.8);
      width: 0%;
      transition: width linear;
      z-index: 60;
    }

    /* ===== Firebase 설정 모달 (마우스 우클릭으로 열림) ===== */
    #config-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }

    #config-modal.show { display: flex; }

    .config-box {
      background: #1e293b;
      border-radius: 16px;
      padding: 32px;
      width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      color: #e2e8f0;
    }

    .config-box h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #f1f5f9;
    }

    .config-box .desc {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .config-form-group {
      margin-bottom: 14px;
    }

    .config-form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 5px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .config-form-group input {
      width: 100%;
      padding: 9px 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 12px;
      font-family: monospace;
    }

    .config-form-group input:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .config-form-group .hint {
      font-size: 11px;
      color: #475569;
      margin-top: 3px;
    }

    .config-actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    .btn-config-save {
      flex: 1;
      background: #f57c00;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-config-save:hover { background: #e65100; }

    .btn-config-cancel {
      background: transparent;
      color: #64748b;
      border: 1px solid #334155;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-config-cancel:hover { color: #e2e8f0; border-color: #475569; }

    /* 설정 모달 내 결과 메시지 */
    #config-result {
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      margin-top: 10px;
      display: none;
    }

    #config-result.success {
      background: rgba(22,163,74,0.2);
      color: #4ade80;
      display: block;
    }

    #config-result.error {
      background: rgba(220,38,38,0.2);
      color: #f87171;
      display: block;
    }

    /* ===== 텍스트 티커 바 (화면 상단에 고정되어 텍스트가 흘러가는 영역) ===== */
    #ticker-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      /* 높이는 JS에서 티커 설정값으로 동적으로 변경됨 */
      height: 50px;
      display: flex;
      align-items: center;
      overflow: hidden;
      /* 기본 배경색: 반투명 빨간색 (admin에서 변경 가능) */
      background: rgba(200, 0, 0, 0.85);
      /* 티커가 슬라이드쇼 위에 표시되도록 z-index 높게 설정 */
      z-index: 80;
      /* ON/OFF 전환 시 부드럽게 나타나고 사라짐 */
      transition: opacity 0.4s ease;
    }

    /* 티커가 숨겨진 상태 (admin에서 OFF 시) */
    #ticker-bar.ticker-hidden {
      display: none;
    }

    /* 티커 바 왼쪽 끝에 고정된 레이블 (선택적 - 현재는 비활성) */
    #ticker-label {
      flex-shrink: 0;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      white-space: nowrap;
      display: none; /* 기본적으로 레이블 숨김 */
    }

    /* 텍스트가 흘러가는 영역: 넘치는 텍스트를 숨기고 내부 텍스트가 이동함 */
    #ticker-track {
      flex: 1;
      overflow: hidden;
      height: 100%;
      position: relative;
    }

    /* 실제 텍스트가 들어있는 요소: CSS animation으로 오른쪽→왼쪽 이동 */
    #ticker-content {
      display: inline-block;
      white-space: nowrap;
      /* 애니메이션과 시작 위치는 JS(applyTickerData)에서 동적으로 설정 */
      /* CSS에서 duration 없이 선언하면 0초 애니메이션 → 텍스트가 화면 밖에 고정되는 버그 발생 */
    }

    /* 텍스트가 오른쪽에서 왼쪽으로 무한 이동하는 애니메이션 */
    @keyframes ticker-scroll {
      0%   { transform: translateX(100vw); }
      100% { transform: translateX(-100%); }
    }

    /* 티커 내 각 메시지 간 구분자 */
    .ticker-separator {
      display: inline-block;
      margin: 0 32px;
      opacity: 0.5;
    }

    /* Firebase 연결 상태 표시 (화면 우상단) */
    #fb-indicator {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.5);
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      z-index: 30;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    #fb-indicator.visible { opacity: 1; }

    /* 실시간 동기화 표시 (연결됐을 때 깜빡이는 점) */
    #fb-indicator .live-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      margin-right: 4px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* 우클릭 메뉴 */
    #context-menu {
      display: none;
      position: fixed;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 6px 0;
      z-index: 400;
      min-width: 180px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    #context-menu .menu-item {
      padding: 8px 16px;
      font-size: 13px;
      color: #e2e8f0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #context-menu .menu-item:hover { background: rgba(255,255,255,0.08); }
    #context-menu .menu-divider { border-top: 1px solid #334155; margin: 4px 0; }
  </style>
</head>
<body>

  <!-- 처음 데이터를 불러올 때 표시되는 로딩 화면 -->
  <div id="loading-screen">
    소재 불러오는 중
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- 소재가 없을 때 보여주는 안내 화면 -->
  <div id="empty-screen" style="display:none;">
    <div class="icon">📺</div>
    <h2>소재를 등록해주세요</h2>
    <p id="empty-msg">admin.html을 열어 이미지나 영상을 업로드하세요</p>
  </div>

  <!-- ===== 텍스트 티커 바 (화면 상단 고정, 슬라이드쇼 위에 표시) ===== -->
  <!-- ticker-hidden 클래스가 붙으면 사라짐, 기본은 숨겨둠 (Firebase 데이터 받은 후 표시) -->
  <div id="ticker-bar" class="ticker-hidden">
    <!-- 왼쪽 레이블 (현재는 숨김 처리) -->
    <div id="ticker-label">NOTICE</div>
    <!-- 텍스트가 이동할 트랙 영역 -->
    <div id="ticker-track">
      <!-- 실제 텍스트 내용 (JS에서 동적으로 채워짐) -->
      <span id="ticker-content"></span>
    </div>
  </div>

  <!-- 슬라이드쇼가 재생될 공간 -->
  <div id="slideshow-container"></div>

  <!-- 화면 하단 진행 바 -->
  <div id="progress-bar"></div>

  <!-- 일시정지/재생 아이콘 -->
  <div id="pause-indicator">⏸</div>

  <!-- 화면 하단 상태 표시줄 -->
  <div id="status-bar">
    <span id="status-current">소재 준비 중...</span>
    <span id="status-hint">더블탭: 전체화면 | F: 전체화면 | Space: 일시정지 | 우클릭: 메뉴</span>
  </div>

  <!-- Firebase 연결 상태 표시 (우상단) -->
  <div id="fb-indicator">
    <span class="live-dot"></span>Firebase 실시간 연결됨
  </div>

  <!-- 우클릭 메뉴 -->
  <div id="context-menu">
    <div class="menu-item" onclick="openConfigModal()">
      🔗 연결 정보
    </div>
    <div class="menu-item" onclick="toggleFullscreen()">
      ⛶ 전체화면 전환
    </div>
    <div class="menu-divider"></div>
    <div class="menu-item" onclick="togglePlay()">
      ⏸ 재생 / 일시정지
    </div>
    <div class="menu-item" onclick="goNext()">
      ▶ 다음 소재
    </div>
    <div class="menu-divider"></div>
    <div class="menu-item" onclick="manualRefresh()">
      🔄 소재 새로고침
    </div>
  </div>

  <!-- Firebase 연결 정보 모달 (우클릭 → 연결 정보로 열림, 읽기 전용) -->
  <div id="config-modal">
    <div class="config-box">
      <h3>🔗 Firebase 연결 정보</h3>
      <p class="desc">
        Firebase 연결 정보가 프로그램에 내장되어 있습니다.<br>
        변경이 필요하면 HTML 소스코드의 FIREBASE_CONFIG를 수정하세요.
      </p>

      <div class="config-form-group">
        <label>Project ID</label>
        <input type="text" id="cfg-projectid" value="did-ads" readonly style="background:rgba(255,255,255,0.05); color:#94a3b8; cursor:default;">
      </div>

      <div class="config-form-group">
        <label>Database URL</label>
        <input type="text" id="cfg-dburl" value="https://did-ads-default-rtdb.asia-southeast1.firebasedatabase.app" readonly style="background:rgba(255,255,255,0.05); color:#94a3b8; cursor:default;">
      </div>

      <div class="config-form-group">
        <label>Storage Bucket</label>
        <input type="text" id="cfg-storagebucket" value="did-ads.firebasestorage.app" readonly style="background:rgba(255,255,255,0.05); color:#94a3b8; cursor:default;">
      </div>

      <div id="config-result"></div>

      <div class="config-actions">
        <button class="btn-config-save" onclick="closeConfigModal()">닫기</button>
      </div>
    </div>
  </div>

  <script>
    // ===================================================
    // DID 디스플레이 — Firebase Realtime Database 실시간 동기화 버전
    // onValue 리스너로 admin 변경 즉시 반영 (폴링 불필요)
    // ===================================================

    // --- Firebase 인스턴스 ---
    let firebaseApp = null;   // Firebase 앱
    let db = null;            // Realtime Database 참조
    let dbListener = null;    // 실시간 리스너 참조 (해제할 때 필요)

    // --- 슬라이드쇼 상태 변수들 ---
    let mediaList = [];          // 재생할 소재 배열 (Firebase에서 불러옴)
    let settings = {};           // 전환효과·속도·노출시간 설정
    let currentIndex = 0;        // 지금 보여주고 있는 소재 번호
    let isPlaying = true;        // 재생 중인지 여부
    let slideTimer = null;       // 다음 슬라이드로 넘어가는 타이머
    let cursorTimer = null;      // 마우스 커서 숨김 타이머
    let statusBarTimer = null;   // 상태 표시줄 숨김 타이머
    let slides = [];             // 화면에 만들어진 슬라이드 DOM 요소들

    // --- 텍스트 티커 상태 변수들 ---
    // tickerData: Firebase에서 받아온 티커 전체 데이터 (설정 + 메시지 목록)
    let tickerData = null;

    // DOM 요소 캐싱 (자주 쓰는 요소들을 미리 변수에 저장해서 성능 향상)
    const container = document.getElementById('slideshow-container');
    const emptyScreen = document.getElementById('empty-screen');
    const loadingScreen = document.getElementById('loading-screen');
    const progressBar = document.getElementById('progress-bar');
    const pauseIndicator = document.getElementById('pause-indicator');
    const statusBar = document.getElementById('status-bar');
    const statusCurrent = document.getElementById('status-current');
    const fbIndicator = document.getElementById('fb-indicator');

    // ===================================================
    // Firebase 설정 — HTML에 직접 내장 (어떤 PC에서든 링크만 열면 바로 사용 가능)
    // ===================================================
    const FIREBASE_CONFIG = {
      apiKey: 'AIzaSyDfRSJqoH4CiTkjCV6nbS4vwof7ergEMfA',
      authDomain: 'did-ads.firebaseapp.com',
      databaseURL: 'https://did-ads-default-rtdb.asia-southeast1.firebasedatabase.app',
      projectId: 'did-ads',
      storageBucket: 'did-ads.firebasestorage.app'
    };

    function getFirebaseConfig() {
      return { ...FIREBASE_CONFIG };
    }

    function isFirebaseConfigured() {
      return !!(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.databaseURL && FIREBASE_CONFIG.projectId);
    }

    // ===================================================
    // Firebase 초기화 (연결 정보로 Firebase에 연결)
    // ===================================================
    function initFirebase() {
      const cfg = getFirebaseConfig();
      if (!cfg.apiKey || !cfg.databaseURL) return false;

      try {
        // 기존 Firebase 앱 인스턴스가 있으면 삭제 후 새로 만들기
        if (firebaseApp) {
          firebaseApp.delete().catch(() => {});
        }

        // Firebase 앱 생성 (고유한 앱 이름으로 여러 인스턴스 충돌 방지)
        firebaseApp = firebase.initializeApp({
          apiKey: cfg.apiKey,
          authDomain: cfg.authDomain,
          databaseURL: cfg.databaseURL,
          projectId: cfg.projectId,
          storageBucket: cfg.storageBucket
        }, 'did-display-' + Date.now());

        // Realtime Database 참조 생성
        db = firebase.database(firebaseApp);
        return true;

      } catch (err) {
        console.error('Firebase 초기화 실패:', err.message);
        return false;
      }
    }

    // ===================================================
    // Firebase Realtime Database 실시간 리스너 설정
    // onValue: 데이터가 변경될 때마다 자동으로 호출됨
    // ===================================================
    function setupRealtimeListener() {
      if (!db) return;

      // 기존 리스너가 있으면 해제 (중복 방지)
      if (dbListener) {
        dbListener.forEach(unsub => unsub());
        dbListener = null;
      }

      // 개별 경로별 실시간 리스너 설정 (보안 규칙이 루트 읽기 차단하므로 분리)
      // admin에서 소재를 추가/삭제/변경하면 즉시 반영됨
      const errorHandler = (err) => {
        console.error('Firebase 실시간 리스너 오류:', err.message);
        fbIndicator.innerHTML = 'Firebase 연결 오류';
        fbIndicator.classList.add('visible');
      };

      // media 변경 감시
      const mediaRef = db.ref('media');
      const mediaHandler = mediaRef.on('value', (snapshot) => {
        const newMediaList = parseMediaList(snapshot.val());
        rebuildIfChanged(newMediaList, settings);
      }, errorHandler);

      // settings 변경 감시
      const settingsRef = db.ref('settings');
      const settingsHandler = settingsRef.on('value', (snapshot) => {
        const newSettings = parseSettings(snapshot.val());
        rebuildIfChanged(mediaList, newSettings);
      }, errorHandler);

      // ticker 변경 감시
      const tickerRef = db.ref('ticker');
      const tickerHandler = tickerRef.on('value', (snapshot) => {
        applyTickerData(snapshot.val() || null);
      }, errorHandler);

      // 리스너 해제 함수 배열로 저장 (나중에 정리할 때 사용)
      dbListener = [
        () => mediaRef.off('value', mediaHandler),
        () => settingsRef.off('value', settingsHandler),
        () => tickerRef.off('value', tickerHandler)
      ];
    }

    // ===================================================
    // Firebase settings 데이터를 앱에서 쓰는 형태로 변환
    // ===================================================
    function parseSettings(settingsData) {
      if (!settingsData) {
        // 설정이 없으면 기본값 반환
        return { defaultDuration: 5, transition: 'fade', transitionSpeed: 800 };
      }
      return {
        defaultDuration: settingsData.displayDuration || 5,
        transition: settingsData.transitionEffect || 'fade',
        // Firebase에 초 단위로 저장됨 → 밀리초로 변환 (0.8 → 800)
        transitionSpeed: Math.round((settingsData.transitionSpeed || 0.8) * 1000)
      };
    }

    // ===================================================
    // Firebase media 데이터를 정렬된 배열로 변환
    // isVisible이 true인 것만 포함
    // ===================================================
    function parseMediaList(mediaData) {
      if (!mediaData) return [];

      // Firebase 객체(키-값)를 배열로 변환
      const allMedia = Object.entries(mediaData).map(([key, value]) => ({
        id: key,
        ...value
      }));

      // isVisible이 false인 것 제외, displayOrder 기준 정렬
      return allMedia
        .filter(m => m.isVisible !== false)
        .sort((a, b) => (a.displayOrder || 0) - (b.displayOrder || 0));
    }

    // ===================================================
    // 변경 사항이 있을 때만 슬라이드 재구성
    // (변경 없으면 현재 재생 유지 — 불필요한 깜빡임 방지)
    // ===================================================
    function rebuildIfChanged(newMediaList, newSettings) {
      // 소재 목록과 설정이 바뀌었는지 비교
      const prevIds = mediaList.map(m => m.id + '_' + m.displayOrder + '_' + m.isVisible).join(',');
      const newIds = newMediaList.map(m => m.id + '_' + m.displayOrder + '_' + m.isVisible).join(',');

      const settingsChanged = JSON.stringify(settings) !== JSON.stringify(newSettings);
      const mediaChanged = prevIds !== newIds;

      if (!mediaChanged && !settingsChanged) {
        // 변경 없음 — 현재 재생 유지
        return;
      }

      settings = newSettings;

      if (mediaChanged) {
        mediaList = newMediaList;
        const wasEmpty = slides.length === 0;
        buildSlides();

        if (slides.length > 0) {
          if (wasEmpty || currentIndex >= slides.length) {
            // 슬라이드가 없었거나 인덱스가 범위를 벗어난 경우 처음부터
            clearTimeout(slideTimer);
            showSlide(0);
          } else {
            // 기존 인덱스 유지 (현재 재생 중인 위치에서 계속)
            clearTimeout(slideTimer);
            showSlide(currentIndex);
          }
        }
      }

      // Firebase 연결 상태 표시
      fbIndicator.innerHTML = '<span class="live-dot"></span>Firebase 실시간 연결됨';
      fbIndicator.classList.add('visible');
      setTimeout(() => fbIndicator.classList.remove('visible'), 3000);
    }

    // ===================================================
    // 슬라이드 DOM 요소 모두 만들기 (or 갱신)
    // ===================================================
    function buildSlides() {
      // 현재 재생 중인 소재의 타이머 정리
      clearTimeout(slideTimer);

      // 컨테이너 비우고 다시 만들기
      container.innerHTML = '';
      slides = [];

      if (mediaList.length === 0) {
        // 노출할 소재가 없으면 안내 화면 표시
        emptyScreen.style.display = 'flex';
        return;
      }

      emptyScreen.style.display = 'none';

      // 각 소재마다 슬라이드 요소 만들기
      mediaList.forEach((media, index) => {
        const slide = document.createElement('div');
        slide.className = 'slide';
        slide.dataset.index = index;
        slide.dataset.type = media.fileType;
        // 개별 노출시간이 있으면 사용, 없으면 기본값
        slide.dataset.duration = (media.duration !== null && media.duration !== undefined)
          ? media.duration
          : (settings.defaultDuration || 5);

        if (media.fileType === 'video') {
          // 영상 소재: video 태그 생성
          const video = document.createElement('video');
          video.src = media.fileUrl;   // Firebase Storage 다운로드 URL
          video.muted = true;          // 소리 없이 재생 (자동재생 정책 때문에 필수)
          video.playsInline = true;
          video.preload = 'auto';

          // 영상이 끝나면 다음 소재로 자동 이동
          video.addEventListener('ended', () => {
            if (isPlaying) goNext();
          });

          // 영상 로드/재생 오류 시 다음으로 이동
          video.addEventListener('error', () => {
            console.warn('영상 재생 오류, 다음 소재로 이동');
            if (isPlaying) setTimeout(goNext, 1000);
          });

          slide.appendChild(video);
        } else {
          // 이미지 소재: img 태그 생성
          const img = document.createElement('img');
          img.src = media.fileUrl;   // Firebase Storage 다운로드 URL
          img.alt = media.fileName || '광고 이미지';

          img.addEventListener('error', () => {
            console.warn('이미지 로드 실패:', media.fileName);
          });

          slide.appendChild(img);
        }

        container.appendChild(slide);
        slides.push(slide);
      });
    }

    // ===================================================
    // 전환효과 CSS 설정 (슬라이드가 들어오기 직전 시작 위치)
    // ===================================================
    function applyEnterEffect(slide, effect) {
      switch (effect) {
        case 'slide-left':
          slide.style.transform = 'translateX(100%)';   // 오른쪽에서 왼쪽으로
          break;
        case 'slide-right':
          slide.style.transform = 'translateX(-100%)';  // 왼쪽에서 오른쪽으로
          break;
        case 'slide-up':
          slide.style.transform = 'translateY(100%)';   // 아래에서 위로
          break;
        case 'zoom-in':
          slide.style.transform = 'scale(0.85)';        // 작게 시작해서 커지기
          break;
        case 'fade':
        default:
          slide.style.transform = 'translate(0,0) scale(1)';
          break;
      }
    }

    // ===================================================
    // 특정 번호의 소재를 화면에 표시 (전환효과 포함)
    // ===================================================
    function showSlide(index) {
      if (slides.length === 0) return;

      // 인덱스 범위 처리 (처음/끝 순환)
      if (index >= slides.length) index = 0;
      if (index < 0) index = slides.length - 1;
      currentIndex = index;

      const effect = settings.transition || 'fade';
      const speed = settings.transitionSpeed || 800;

      // 모든 슬라이드에 전환 속도 일괄 적용
      slides.forEach(s => {
        s.style.transitionDuration = `${speed}ms`;
      });

      // 현재 슬라이드 비활성화 (서서히 사라짐)
      slides.forEach(s => s.classList.remove('active'));

      // 새 슬라이드 진입 위치 설정
      const newSlide = slides[index];
      applyEnterEffect(newSlide, effect);

      // 한 프레임 기다린 후 active 클래스 추가 (CSS 애니메이션 트리거)
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          newSlide.style.transform = 'translate(0,0) scale(1)';
          newSlide.classList.add('active');
        });
      });

      // 화면 하단 상태 표시줄 업데이트
      const media = mediaList[index];
      statusCurrent.textContent = `${index + 1} / ${slides.length}  |  ${media ? media.fileName : ''}`;

      const video = newSlide.querySelector('video');

      if (video) {
        // 영상: 처음부터 재생 시작
        video.currentTime = 0;
        if (isPlaying) {
          video.play().catch(err => {
            // 브라우저 자동재생 정책에 의해 차단된 경우
            console.warn('자동재생 차단됨:', err);
            setTimeout(goNext, 3000);
          });
        }
        // 영상일 때 진행 바는 0으로 고정
        progressBar.style.transition = 'none';
        progressBar.style.width = '0%';
      } else {
        // 이미지: 설정 시간 후 다음으로 넘어가는 타이머 설정
        const duration = parseInt(newSlide.dataset.duration, 10) * 1000;
        startProgressBar(duration);
        if (isPlaying) {
          clearTimeout(slideTimer);
          slideTimer = setTimeout(goNext, duration);
        }
      }
    }

    // ===================================================
    // 다음 소재로 넘어가기
    // ===================================================
    function goNext() {
      if (slides.length === 0) return;
      showSlide((currentIndex + 1) % slides.length);
    }

    // ===================================================
    // 진행 바 애니메이션 시작 (이미지 노출 시간 시각화)
    // ===================================================
    function startProgressBar(duration) {
      progressBar.style.transition = 'none';
      progressBar.style.width = '0%';

      // 두 프레임 기다린 후 애니메이션 시작 (CSS transition 트리거)
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          progressBar.style.transition = `width ${duration}ms linear`;
          progressBar.style.width = '100%';
        });
      });
    }

    // ===================================================
    // 재생 / 일시정지 토글
    // ===================================================
    function togglePlay() {
      isPlaying = !isPlaying;
      closeContextMenu();

      // 일시정지/재생 아이콘을 잠깐 표시
      pauseIndicator.textContent = isPlaying ? '▶' : '⏸';
      pauseIndicator.classList.add('visible');
      setTimeout(() => pauseIndicator.classList.remove('visible'), 1500);

      if (isPlaying) {
        // 재생 재개
        const video = slides[currentIndex]?.querySelector('video');
        if (video) {
          video.play();
        } else {
          // 이미지: 남은 시간만큼 타이머 재시작 (근사값으로 처음부터)
          const duration = parseInt(slides[currentIndex]?.dataset.duration || 5, 10) * 1000;
          startProgressBar(duration);
          slideTimer = setTimeout(goNext, duration);
        }
      } else {
        // 일시정지
        clearTimeout(slideTimer);
        progressBar.style.transition = 'none'; // 진행 바 멈춤
        const video = slides[currentIndex]?.querySelector('video');
        if (video) video.pause();
      }
    }

    // ===================================================
    // 전체화면 전환 (더블탭/더블클릭/F 키/메뉴 클릭)
    // 삼성 스마트TV(Tizen), iOS Safari 등 벤더 프리픽스 대응
    // ===================================================
    function toggleFullscreen() {
      // 현재 전체화면 상태인지 확인 (브라우저별로 다른 속성명 대응)
      const fullscreenEl = document.fullscreenElement
        || document.webkitFullscreenElement
        || document.mozFullScreenElement
        || document.msFullscreenElement;

      if (!fullscreenEl) {
        // 전체화면 진입 — 브라우저가 지원하는 방식을 순서대로 시도
        const el = document.documentElement;
        if (el.requestFullscreen) {
          el.requestFullscreen().catch(err => console.warn('전체화면 실패:', err));
        } else if (el.webkitRequestFullscreen) {
          // 삼성 스마트TV(Tizen), iOS Safari, 구형 Chrome
          el.webkitRequestFullscreen();
        } else if (el.mozRequestFullScreen) {
          // 구형 Firefox
          el.mozRequestFullScreen();
        } else if (el.msRequestFullscreen) {
          // IE/Edge (구형)
          el.msRequestFullscreen();
        } else {
          console.warn('이 브라우저는 전체화면 API를 지원하지 않습니다');
        }
      } else {
        // 전체화면 해제
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.mozCancelFullScreen) {
          document.mozCancelFullScreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
      }
    }

    // ===================================================
    // 수동 새로고침 (메뉴에서 클릭 시)
    // Firebase에서 최신 데이터를 강제로 다시 읽기
    // ===================================================
    async function manualRefresh() {
      closeContextMenu();
      if (!db) {
        showFbStatus('Firebase 미연결');
        return;
      }

      showFbStatus('새로고침 중...');

      try {
        // Firebase DB에서 현재 데이터를 한 번 읽기
        const snapshot = await db.ref('/').once('value');
        const data = snapshot.val();

        const newSettings = parseSettings(data?.settings);
        const newMediaList = parseMediaList(data?.media);

        settings = newSettings;
        mediaList = newMediaList;

        // 새로고침 시 티커 데이터도 갱신
        applyTickerData(data?.ticker || null);

        buildSlides();
        if (slides.length > 0) {
          showSlide(0);
        }

        showFbStatus('새로고침 완료');
      } catch (err) {
        showFbStatus('새로고침 실패');
        console.error('수동 새로고침 실패:', err.message);
      }
    }

    // ===================================================
    // Firebase 연결 상태를 화면 상단에 잠깐 표시
    // ===================================================
    function showFbStatus(message) {
      fbIndicator.innerHTML = message;
      fbIndicator.classList.add('visible');
      setTimeout(() => fbIndicator.classList.remove('visible'), 2500);
    }

    // ===================================================
    // 텍스트 티커 적용 함수
    // Firebase에서 받아온 ticker 데이터를 화면에 반영
    // - 티커 ON/OFF 처리
    // - 노출 메시지 조합 후 CSS animation으로 흘려보내기
    // - 배경색·글자색·폰트 크기·속도·바 높이 스타일 적용
    // ===================================================
    function applyTickerData(ticker) {
      const bar = document.getElementById('ticker-bar');
      const content = document.getElementById('ticker-content');

      // 티커 데이터가 없거나 enabled가 false면 숨김
      if (!ticker || ticker.enabled === false) {
        bar.classList.add('ticker-hidden');
        console.log('[DID] 티커 OFF — enabled:', ticker?.enabled);
        return;
      }

      // 노출 상태인 메시지만 필터링 (isVisible이 false인 것 제외)
      // order 기준으로 정렬 (숫자가 작을수록 먼저 표시)
      const messages = ticker.messages
        ? Object.entries(ticker.messages)
            .map(([key, val]) => ({ id: key, ...val }))
            .filter(m => m.isVisible !== false)
            .sort((a, b) => (a.order || 0) - (b.order || 0))
        : [];

      // 노출할 메시지가 하나도 없으면 티커 숨김
      if (messages.length === 0) {
        bar.classList.add('ticker-hidden');
        console.log('[DID] 티커 OFF — 노출할 메시지 없음');
        return;
      }

      // ---- 스타일 적용 ----
      const style = ticker.style || {};

      // 배경색 (기본: 반투명 빨간색)
      bar.style.background = style.bgColor || 'rgba(200, 0, 0, 0.85)';

      // 바 높이 (기본: 50px)
      const barHeight = style.barHeight || 50;
      bar.style.height = barHeight + 'px';

      // 글자 색상 (기본: 흰색)
      content.style.color = style.textColor || '#FFFFFF';

      // 폰트 크기 (기본: 28px)
      const fontSize = style.fontSize || 28;
      content.style.fontSize = fontSize + 'px';
      content.style.fontWeight = '600';
      content.style.lineHeight = barHeight + 'px';

      // ---- 텍스트 조합 ----
      // 여러 메시지를 구분자(■)로 연결해서 하나의 긴 텍스트로 만듦
      const combined = messages
        .map(m => m.text)
        .join('<span class="ticker-separator">■</span>');

      content.innerHTML = combined;

      // ---- 롤링 속도 설정 ----
      // 속도 옵션: slow(느림) / normal(보통) / fast(빠름)
      // duration 값이 클수록 느리게 흘러감
      const speedMap = {
        slow:   50,   // 50초 (느림)
        normal: 30,   // 30초 (보통)
        fast:   15    // 15초 (빠름)
      };
      const duration = speedMap[style.speed] || speedMap.normal;

      // 애니메이션 초기화 후 재적용
      // 1) 기존 애니메이션 제거
      content.style.animation = 'none';
      // 2) 시작 위치를 화면 오른쪽 밖으로 설정
      content.style.transform = 'translateX(100vw)';

      // 3) 한 프레임 후 애니메이션 다시 시작 (브라우저가 변경을 인식하도록)
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          content.style.transform = '';
          content.style.animation = `ticker-scroll ${duration}s linear infinite`;
        });
      });

      // 티커 표시 (hidden 클래스 제거 + display 복원)
      bar.classList.remove('ticker-hidden');
      bar.style.display = 'flex';

      console.log('[DID] 티커 표시됨:', messages.length + '개 메시지, 속도=' + style.speed);
    }

    // ===================================================
    // 더블탭(터치) / 더블클릭(마우스) → 전체화면 전환
    // 마우스 없는 터치 기기(삼성 스마트TV 등)에서 화면을 두 번 탭하면
    // 전체화면으로 전환됨. 마우스가 있는 환경에서는 더블클릭도 동일하게 동작
    //
    // 핵심: 브라우저 dblclick 이벤트에 의존하지 않고,
    // click/touchend 이벤트의 시간 간격으로 직접 더블 입력을 감지함
    // (일부 브라우저에서 click 핸들러가 dblclick 생성을 방해하는 문제 회피)
    // ===================================================

    // 마지막 클릭/탭 시간 기록 (더블 감지용)
    let lastClickTime = 0;

    // 클릭/탭이 UI 요소(메뉴, 모달) 위인지 확인하는 함수
    function isOnUIElement(target) {
      const menu = document.getElementById('context-menu');
      const modal = document.getElementById('config-modal');
      return (menu && menu.contains(target)) || (modal && modal.contains(target));
    }

    // 더블 입력 감지 함수 (click, touchend 공용)
    function detectDoubleInput(e) {
      // 메뉴나 모달 위에서는 무시
      if (isOnUIElement(e.target)) return;

      const now = Date.now();
      const gap = now - lastClickTime;

      // 두 번째 입력이 첫 번째로부터 50~500ms 사이면 더블로 판정
      // 50ms 미만은 이벤트 중복 방지, 500ms 초과는 별개 클릭
      if (gap > 50 && gap < 500) {
        toggleFullscreen();
        lastClickTime = 0;
      } else {
        lastClickTime = now;
      }
    }

    // 터치 기기: 화면을 빠르게 두 번 터치하면 전체화면 전환
    document.addEventListener('touchend', (e) => {
      detectDoubleInput(e);
    });

    // 터치 기기에서 더블탭 시 브라우저 기본 확대/축소 방지
    document.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        const now = Date.now();
        if (now - lastClickTime > 50 && now - lastClickTime < 500) {
          e.preventDefault();
        }
      }
    }, { passive: false });

    // ===================================================
    // 마우스 커서 숨김/표시 처리
    // 3초간 마우스를 움직이지 않으면 커서와 상태 표시줄 숨김
    // ===================================================
    function setupCursorHide() {
      document.addEventListener('mousemove', () => {
        document.body.style.cursor = 'default';
        statusBar.classList.add('visible');
        clearTimeout(cursorTimer);
        clearTimeout(statusBarTimer);

        cursorTimer = setTimeout(() => {
          document.body.style.cursor = 'none';
        }, 3000);

        statusBarTimer = setTimeout(() => {
          statusBar.classList.remove('visible');
        }, 3000);
      });

      // 처음 3초 후 자동으로 커서 숨김
      cursorTimer = setTimeout(() => {
        document.body.style.cursor = 'none';
      }, 3000);
    }

    // ===================================================
    // 키보드 단축키 처리
    // F: 전체화면, Space: 일시정지, 좌우화살표: 앞뒤 이동
    // ===================================================
    document.addEventListener('keydown', (e) => {
      switch (e.key) {
        case 'f':
        case 'F':
          toggleFullscreen();
          break;
        case ' ':
          e.preventDefault(); // 브라우저 기본 스크롤 방지
          togglePlay();
          break;
        case 'ArrowRight':
          clearTimeout(slideTimer);
          goNext();
          break;
        case 'ArrowLeft':
          clearTimeout(slideTimer);
          showSlide(currentIndex - 1);
          break;
        case 'Escape':
          closeContextMenu();
          closeConfigModal();
          break;
      }
    });

    // ===================================================
    // 우클릭 컨텍스트 메뉴 (기본 메뉴 대신 커스텀 메뉴 표시)
    // ===================================================
    document.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const menu = document.getElementById('context-menu');
      menu.style.display = 'block';
      // 화면 밖으로 나가지 않도록 위치 조정
      menu.style.left = Math.min(e.clientX, window.innerWidth - 200) + 'px';
      menu.style.top = Math.min(e.clientY, window.innerHeight - 150) + 'px';
    });

    // 화면 클릭 시: 더블클릭 감지(전체화면) + 컨텍스트 메뉴 닫기
    // 중요: detectDoubleInput을 먼저 실행해야 user activation이 유효한 상태에서
    // requestFullscreen()이 호출됨 (DOM 조작 전에 전체화면 요청)
    document.addEventListener('click', (e) => {
      // 1) 더블클릭 감지 → 전체화면 전환 (user activation 소모 전에 먼저 실행)
      detectDoubleInput(e);
      // 2) 컨텍스트 메뉴 닫기
      if (!document.getElementById('context-menu').contains(e.target)) {
        closeContextMenu();
      }
    });

    function closeContextMenu() {
      document.getElementById('context-menu').style.display = 'none';
    }

    // ===================================================
    // 연결 정보 모달 열기 (우클릭 메뉴에서 호출)
    // ===================================================
    function openConfigModal() {
      closeContextMenu();
      document.getElementById('config-result').style.display = 'none';
      document.getElementById('config-modal').classList.add('show');
    }

    // ===================================================
    // 연결 정보 모달 닫기
    // ===================================================
    function closeConfigModal() {
      document.getElementById('config-modal').classList.remove('show');
    }

    // 모달 바깥쪽 클릭 시 닫기
    document.getElementById('config-modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('config-modal')) closeConfigModal();
    });

    // ===================================================
    // 앱 시작: 페이지 로드 시 실행
    // ===================================================
    async function init() {
      // Firebase 설정 확인
      if (!isFirebaseConfigured()) {
        // 설정이 없으면 로딩 화면 숨기고 빈 화면 + 안내 표시
        setTimeout(() => {
          loadingScreen.classList.add('hidden');
          setTimeout(() => loadingScreen.style.display = 'none', 600);
        }, 500);

        emptyScreen.style.display = 'flex';
        document.getElementById('empty-msg').textContent =
          'Firebase 설정이 누락되었습니다. HTML 소스의 FIREBASE_CONFIG를 확인하세요.';
        return;
      }

      try {
        // Firebase 초기화
        const initialized = initFirebase();
        console.log('[DID] Firebase 초기화:', initialized);
        if (!initialized) throw new Error('Firebase 초기화 실패');

        // Firebase DB에서 초기 데이터 읽기 — 개별 경로로 분리 (보안 규칙이 루트 읽기 차단)
        console.log('[DID] 데이터 로딩 시작...');
        const [mediaSnap, settingsSnap, tickerSnap] = await Promise.all([
          db.ref('media').once('value'),
          db.ref('settings').once('value'),
          db.ref('ticker').once('value')
        ]);

        console.log('[DID] media 데이터:', mediaSnap.val() ? Object.keys(mediaSnap.val()).length + '개' : 'null');
        console.log('[DID] settings 데이터:', settingsSnap.val());

        settings = parseSettings(settingsSnap.val());
        mediaList = parseMediaList(mediaSnap.val());

        console.log('[DID] 파싱된 mediaList:', mediaList.length + '개');

        // 티커 초기 데이터도 함께 적용
        applyTickerData(tickerSnap.val() || null);

      } catch (err) {
        // 초기 연결 실패
        console.error('[DID] 초기 데이터 로드 실패:', err.message, err);
        mediaList = [];
        settings = { defaultDuration: 5, transition: 'fade', transitionSpeed: 800 };
      }

      // 로딩 화면 숨기기 (부드럽게 사라짐)
      setTimeout(() => {
        loadingScreen.classList.add('hidden');
        setTimeout(() => loadingScreen.style.display = 'none', 500);
      }, 600);

      // 슬라이드 구성 및 첫 번째 소재 표시
      buildSlides();
      if (slides.length > 0) {
        showSlide(0);
      }

      // 연결이 되었으면 실시간 리스너 설정 (이후 변경 자동 반영)
      if (db) {
        setupRealtimeListener();

        // Firebase 연결 상태 잠깐 표시
        fbIndicator.innerHTML = '<span class="live-dot"></span>Firebase 실시간 연결됨';
        fbIndicator.classList.add('visible');
        setTimeout(() => fbIndicator.classList.remove('visible'), 3000);
      } else {
        // 연결 실패 시 안내
        emptyScreen.style.display = slides.length === 0 ? 'flex' : 'none';
        if (slides.length === 0) {
          document.getElementById('empty-msg').textContent =
            'Firebase 연결에 실패했습니다. 네트워크 및 Firebase 콘솔 설정을 확인하세요.';
        }
      }

      // 마우스 커서 자동 숨김 설정
      setupCursorHide();
    }

    // 페이지 완전히 로드된 후 시작
    window.addEventListener('load', init);
  </script>
</body>
</html>
