<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빡곰 프로덕션 리뷰</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<style>
/* ========== 리셋 & 기본 ========== */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard Variable',-apple-system,sans-serif;background:#f5f5f7;color:#1d1d1f;line-height:1.6}
html{scroll-behavior:smooth}

/* ========== 레이아웃 ========== */
.app{display:flex;min-height:100vh}

/* 사이드바 */
.sidebar{width:260px;background:#fff;border-right:1px solid #e5e5e7;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:50}
.sidebar-header{padding:24px 20px 16px;border-bottom:1px solid #f0f0f2}
.sidebar-header h1{font-size:18px;font-weight:700}
.sidebar-header p{font-size:12px;color:#86868b;margin-top:2px}
.prod-list{padding:12px}
.prod-item{padding:12px 16px;border-radius:10px;cursor:pointer;margin-bottom:4px;transition:all .15s}
.prod-item:hover{background:#f5f5f7}
.prod-item.active{background:#0071e3;color:#fff}
.prod-item .prod-num{font-size:12px;font-weight:700;opacity:.6}
.prod-item .prod-title{font-size:14px;font-weight:600;margin-top:2px}
.prod-item .prod-status{font-size:11px;margin-top:4px;opacity:.7}
.prod-item.active .prod-num,.prod-item.active .prod-status{opacity:.8}
.sidebar-footer{padding:16px 20px;border-top:1px solid #f0f0f2;font-size:11px;color:#86868b}

/* 메인 */
.main{margin-left:260px;flex:1;min-width:0}

/* 탑바 */
.topbar{background:#fff;border-bottom:1px solid #e5e5e7;padding:16px 32px;position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.topbar .tab{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid #d2d2d7;background:#fff;font-family:inherit;transition:all .15s}
.topbar .tab:hover{border-color:#86868b}
.topbar .tab.active{background:#1d1d1f;color:#fff;border-color:#1d1d1f}
.topbar .spacer{flex:1}
.topbar .pending-count{padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;background:#fff3e0;color:#e65100}

/* 콘텐츠 */
.content{max-width:960px;margin:0 auto;padding:32px}

/* ========== 카드 공통 ========== */
.card{background:#fff;border-radius:16px;padding:32px;margin-bottom:24px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h2{font-size:22px;font-weight:700;margin-bottom:16px}
.card h3{font-size:16px;font-weight:600;margin-bottom:12px}

/* ========== 기획초안 ========== */
.planning-concept{font-size:15px;line-height:1.8;color:#424245;margin-bottom:24px}
.planning-concept strong{color:#1d1d1f}

.scene-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
.scene-table th{background:#f5f5f7;padding:10px 12px;text-align:left;font-weight:600;font-size:12px;color:#86868b;text-transform:uppercase;letter-spacing:.3px}
.scene-table td{padding:10px 12px;border-bottom:1px solid #f0f0f2;vertical-align:top}
.scene-table tr:last-child td{border-bottom:none}
.scene-table .scene-num{font-weight:700;color:#0071e3;white-space:nowrap}

.subtitle-plan{margin-top:20px;padding:20px;background:#f9fafb;border-radius:10px;border-left:3px solid #0071e3}
.subtitle-plan .sub-line{display:flex;align-items:flex-start;gap:8px;padding:6px 0;font-size:14px}
.subtitle-plan .sub-line .arrow{color:#86868b;flex-shrink:0}

/* ========== 통계 ========== */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.stat{background:#f5f5f7;border-radius:12px;padding:16px;text-align:center}
.stat .num{font-size:28px;font-weight:700;color:#0071e3}
.stat .lbl{font-size:12px;color:#86868b;margin-top:2px}

/* ========== 스토리보드 ========== */
.storyboard-strip{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px}
.storyboard-strip::-webkit-scrollbar{height:5px}
.storyboard-strip::-webkit-scrollbar-thumb{background:#c7c7cc;border-radius:3px}
.s-thumb{flex-shrink:0;width:80px;cursor:pointer;transition:transform .2s}
.s-thumb:hover{transform:scale(1.05)}
.s-thumb img{width:80px;height:142px;object-fit:cover;border-radius:6px;border:2px solid transparent;transition:border-color .2s}
.s-thumb.on img{border-color:#0071e3}
.s-thumb span{display:block;font-size:10px;color:#86868b;text-align:center;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ========== 장면 카드 ========== */
.scene-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:24px}
.scene-hd{padding:20px 28px;border-bottom:1px solid #f0f0f2;display:flex;align-items:center;gap:14px}
.scene-hd .sn{background:#0071e3;color:#fff;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.scene-hd .st{font-size:17px;font-weight:600}
.scene-hd .sd{font-size:12px;color:#86868b;margin-top:1px}
.scene-hd .badges{margin-left:auto;display:flex;gap:5px}
.badge{padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600}
.b-h{background:#e8f5e9;color:#2e7d32}.b-f{background:#e3f2fd;color:#1565c0}.b-i{background:#fff3e0;color:#e65100}
.compare-tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;background:#fef3c7;color:#92400e;margin-left:6px}

.scene-bd{padding:24px 28px}

/* 프롬프트 섹션 */
.prompt-sec{margin-bottom:20px}
.prompt-sec h4{font-size:13px;font-weight:600;color:#86868b;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.prompt-sec h4::before{content:'';width:3px;height:12px;border-radius:2px}
.prompt-sec h4.pi::before{background:#ff9500}
.prompt-sec h4.pv::before{background:#0071e3}

/* 이중 언어 프롬프트 박스 */
.bilingual{border-radius:10px;overflow:hidden;border:1px solid #e5e5e7;margin-bottom:12px}
.bilingual .lang-tab{display:flex;border-bottom:1px solid #e5e5e7;background:#fafafa}
.bilingual .lang-tab button{flex:1;padding:8px;font-size:12px;font-weight:600;border:none;background:transparent;cursor:pointer;font-family:inherit;color:#86868b;transition:all .15s}
.bilingual .lang-tab button.on{background:#fff;color:#1d1d1f;box-shadow:inset 0 -2px 0 #0071e3}
.bilingual .lang-body{position:relative}
.bilingual .lang-panel{padding:16px 18px;font-size:13px;line-height:1.7;display:none}
.bilingual .lang-panel.on{display:block}
.bilingual .lang-panel.en{font-family:'SF Mono','Menlo',monospace;color:#424245}
.bilingual .lang-panel.kr{color:#1d1d1f}
.bilingual .copy-btn{position:absolute;top:8px;right:8px;background:#fff;border:1px solid #d2d2d7;border-radius:5px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:inherit;opacity:0;transition:opacity .2s}
.bilingual:hover .copy-btn{opacity:1}

/* 공통 프롬프트 접기 */
.core-toggle{padding:10px 14px;background:#f5f5f7;border-radius:8px;font-size:12px;color:#86868b;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.core-toggle .arrow{transition:transform .2s;font-size:10px}
.core-toggle.open .arrow{transform:rotate(90deg)}
.core-content{display:none;padding:12px 14px;background:#fafafa;border-radius:8px;font-size:12px;line-height:1.7;margin-bottom:8px}
.core-content.on{display:block}

/* 미디어 */
.media-grid{display:grid;gap:16px;margin-top:12px}
.media-grid.g1{grid-template-columns:1fr;max-width:320px}
.media-grid.g2{grid-template-columns:1fr 1fr}
.media-grid.g3{grid-template-columns:1fr 1fr 1fr}
.m-item .m-label{font-size:11px;font-weight:600;color:#86868b;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%}
.dot-h{background:#4caf50}.dot-f{background:#2196f3}.dot-i{background:#ff9500}
.m-item img{width:100%;border-radius:8px;aspect-ratio:9/16;object-fit:cover;background:#f0f0f2}
.m-item video{width:100%;border-radius:8px;aspect-ratio:9/16;object-fit:contain;background:#000}
.m-meta{font-size:10px;color:#86868b;margin-top:4px}

/* 노트 */
.note-box{margin-top:14px;padding:10px 14px;background:#fef3c7;border-radius:8px;font-size:12px;color:#92400e}

/* ========== 비용 테이블 ========== */
.cost-tbl{width:100%;border-collapse:collapse;font-size:13px}
.cost-tbl th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:#86868b;text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid #e5e5e7}
.cost-tbl td{padding:10px 14px;border-bottom:1px solid #f0f0f2}
.cost-tbl .total td{font-weight:700;background:#f5f5f7;border-radius:8px;border-bottom:none}

/* ========== 규칙 ========== */
.rule-item{padding:10px 0;border-bottom:1px solid #f0f0f2;font-size:13px}
.rule-item:last-child{border-bottom:none}
.rule-item strong{color:#0071e3}

/* ========== 수정 요청 (상시 노출) ========== */
.edit-area{margin-top:14px;border:1px solid #e5e5e7;border-radius:10px;padding:12px 14px;background:#fafafa;transition:border-color .2s}
.edit-area:focus-within{border-color:#ff9500;background:#fffbf5}
.edit-area .edit-label{font-size:11px;font-weight:600;color:#999;margin-bottom:6px}
.edit-textarea{width:100%;min-height:44px;max-height:200px;border:none;border-radius:0;padding:0;font-family:'Pretendard Variable',-apple-system,sans-serif;font-size:13px;line-height:1.6;resize:vertical;background:transparent;color:#1d1d1f}
.edit-textarea:focus{outline:none}
.edit-textarea::placeholder{color:#c7c7cc;font-size:12px}
.edit-actions{display:flex;align-items:center;gap:8px;margin-top:8px;display:none}
.edit-area:focus-within .edit-actions,.edit-area.has-text .edit-actions{display:flex}
.edit-save{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;border:none;background:#ff9500;color:#fff;cursor:pointer;font-family:inherit;transition:all .15s}
.edit-save:hover{background:#e68600}
.edit-save:disabled{opacity:.5;cursor:not-allowed}
.edit-status{font-size:11px;color:#86868b}

/* 저장된 메모 표시 (편집 모드 아닐 때도 보임) */
.saved-memo{margin-top:12px;border-radius:10px;padding:14px 16px;font-size:13px;line-height:1.6;position:relative}
.saved-memo.pending{background:#fff8e1;border:1px solid #ffe082;color:#6d4c00}
.saved-memo.resolved{background:#e8f5e9;border:1px solid #a5d6a7;color:#1b5e20}
.saved-memo .memo-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;margin-bottom:6px}
.saved-memo.pending .memo-badge{background:#ff9500;color:#fff}
.saved-memo.resolved .memo-badge{background:#4caf50;color:#fff}
.saved-memo .memo-text{white-space:pre-wrap}
.saved-memo .memo-time{font-size:10px;color:#999;margin-top:6px}

/* ========== 반응형 ========== */
@media(max-width:900px){
  .sidebar{display:none}
  .main{margin-left:0}
  .media-grid.g2,.media-grid.g3{grid-template-columns:1fr;max-width:360px}
}
.hidden{display:none!important}
.section{display:none}.section.on{display:block}
</style>
</head>

<div class="main">

</div>

</div>

// 탑바 — 편집 모드 토글 포함
function renderTopbar(){
  const tabs = [

    {id:'scenes',label:'제작과정'},
    {id:'rules',label:'프롬프트 규칙'},

// 저장된 메모 + 수정 요청 textarea 를 합쳐서 렌더링 (항상 표시)
function renderEditBlock(editKey, placeholder){
  const prodEdits = editsCache[currentProd.id] || {};
  const saved = prodEdits[editKey];
  let html = '';

  // 저장된 메모가 있으면 표시
  if(saved && saved.text){
    const st = saved.status || 'pending';
    const label = st === 'resolved' ? '반영 완료' : '대기중';
    const time = saved.timestamp ? new Date(saved.timestamp).toLocaleString('ko-KR') : '';
    html += `<div class="saved-memo ${st}">
      <span class="memo-badge">${label}</span>
      <div class="memo-text">${esc(saved.text)}</div>
      ${time ? `<div class="memo-time">${time}</div>` : ''}
    </div>`;
  }

  // 수정 요청 입력 영역 (항상 표시, 포커스 시 저장 버튼 노출)
  const prefill = saved && saved.text && saved.status !== 'resolved' ? saved.text : '';
  html += `<div class="edit-area${prefill ? ' has-text' : ''}" data-key="${editKey}">
    <div class="edit-label">수정 요청</div>
    <textarea class="edit-textarea" placeholder="${placeholder}" data-key="${editKey}" oninput="autoGrow(this)">${prefill}</textarea>
    <div class="edit-actions">
      <button class="edit-save" onclick="saveEdit('${editKey}', this)">저장</button>
      <span class="edit-status"></span>
    </div>
  </div>`;

  return html;
}

// 이중 언어 프롬프트 박스
function bilingual(data,id){
  return `<div class="bilingual">
    <div class="lang-tab">
      <button class="on" onclick="switchLang(this,'en')">English</button>
      <button onclick="switchLang(this,'kr')">한국어</button>
    </div>
    <div class="lang-body">
      <button class="copy-btn" onclick="copyText(this)">복사</button>
      <div class="lang-panel en on">${esc(data.en)}</div>
      <div class="lang-panel kr">${esc(data.kr)}</div>
    </div>
  </div>`;
}

function bilingualInline(data){
  return `<div style="margin-bottom:6px"><strong style="font-size:11px;color:#86868b">EN:</strong><br><span style="font-family:'SF Mono','Menlo',monospace;font-size:11px;color:#424245">${esc(data.en)}</span></div>
  <div><strong style="font-size:11px;color:#86868b">KR:</strong><br><span style="font-size:12px">${esc(data.kr)}</span></div>`;
}

// ================================================================
// 유틸 함수
// ================================================================
function switchLang(btn,lang){
  const tabs = btn.parentElement;
  const body = tabs.nextElementSibling;
  tabs.querySelectorAll('button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  body.querySelectorAll('.lang-panel').forEach(p=>{p.classList.toggle('on',p.classList.contains(lang))});
}
function toggleCore(el){
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('on');
}
function copyText(btn){
  const panel = btn.parentElement.querySelector('.lang-panel.on');
  navigator.clipboard.writeText(panel.innerText).then(()=>{btn.textContent='복사됨!';setTimeout(()=>btn.textContent='복사',1500)});
}
function selectProd(id){
  currentProd = PRODUCTIONS.find(p=>p.id===id)||PRODUCTIONS[0];
  currentTab = 'planning';
  render();
}
function switchTab(id){
  currentTab = id;
  renderTopbar();
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('on'));
  const sec = document.getElementById('sec-'+id);
  if(sec) sec.classList.add('on');
  document.querySelectorAll('.topbar .tab').forEach(t=>t.classList.toggle('active',t.textContent==={planning:'기획초안',scenes:'제작과정',rules:'프롬프트 규칙',cost:'비용'}[id]));
}
function render(){renderSidebar();renderTopbar();renderContent()}

// ================================================================
// textarea 자동 높이 조절 + has-text 클래스 토글
// ================================================================
function autoGrow(el){
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
  el.closest('.edit-area').classList.toggle('has-text', el.value.trim().length > 0);
}

// ================================================================
// Firebase 수정사항 저장
// ================================================================
function saveEdit(editKey, btnEl){
  const area = btnEl.closest('.edit-area');
  const textarea = area.querySelector('.edit-textarea');
  const statusEl = area.querySelector('.edit-status');
  const text = textarea.value.trim();

  if(!text){
    statusEl.textContent = '내용을 입력해주세요';
    statusEl.style.color = '#ff3b30';
    return;
  }

  btnEl.disabled = true;
  statusEl.textContent = '저장중...';
  statusEl.style.color = '#86868b';

  // Firebase DB에 저장
  const path = `bbakgom-review/${currentProd.id}/edits/${editKey}`;
  db.ref(path).set({
    text: text,
    timestamp: firebase.database.ServerValue.TIMESTAMP,
    status: 'pending'
  }).then(()=>{
    statusEl.textContent = '저장 완료!';
    statusEl.style.color = '#34c759';
    btnEl.disabled = false;
    // 캐시 업데이트
    if(!editsCache[currentProd.id]) editsCache[currentProd.id] = {};
    editsCache[currentProd.id][editKey] = { text, timestamp: Date.now(), status: 'pending' };
    // 리렌더링해서 저장된 메모 표시
    setTimeout(()=> renderContent(), 500);
  }).catch(err=>{
    statusEl.textContent = '저장 실패: ' + err.message;
    statusEl.style.color = '#ff3b30';
    btnEl.disabled = false;
  });
}

// ================================================================
// Firebase에서 기존 수정사항 로드 (실시간 리스너)
// ================================================================
function watchEdits(){
  PRODUCTIONS.forEach(prod=>{
    const path = `bbakgom-review/${prod.id}/edits`;
    db.ref(path).on('value', snap=>{
      const data = snap.val();
      if(data){
        editsCache[prod.id] = data;
      } else {
        editsCache[prod.id] = {};
      }
      // 현재 보고있는 프로덕션이면 리렌더링
      if(prod.id === currentProd.id){
        renderContent();
      }
    });
  });
}

// ================================================================
// 초기화
// ================================================================
render();
watchEdits();
</script>
</body>
</html>
