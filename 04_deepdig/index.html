<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- DeepDig — 상시 오픈 사이드바 + 인라인 검색 + 주요지표 배지 -->
  <title>DeepDig</title>

  <!-- Pretendard: 깔끔한 한국어 산세리프 폰트 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

  <!-- registry.js: 보고서 메타데이터 (research-crawler가 자동 갱신) -->
  <!-- 캐시 방지: firebase.json에서 registry.js에 no-cache 헤더 설정됨 -->
  <script src="registry.js?v=20260304"></script>

  <style>
    /* ===========================================
       CSS 변수 — 색상/크기 한 곳에서 관리
    =========================================== */
    :root {
      --sidebar-width: 260px;   /* 사이드바 너비 */
      --nav-height: 56px;       /* 상단 네비 높이 */
      --color-bg: #F7F8FA;      /* 앱 배경색 */
      --color-white: #ffffff;
      --color-ink: #1a1a2e;     /* 주 텍스트색 */
      --color-muted: #94a3b8;   /* 보조 텍스트 */
      --color-faint: #cbd5e1;   /* 흐린 텍스트 */
      --color-border: #f1f5f9;  /* 테두리 */
      --color-border-md: #e2e8f0;
      --color-surface: #f8fafc; /* 카드 내 배경 */

      /* 주요지표 방향 색상 — 한국 증시 관례 */
      --color-up: #e53e3e;   /* 상승 = 빨강 */
      --color-down: #3182ce; /* 하락 = 파랑 */
      --color-flat: #94a3b8; /* 보합 = 회색 */
    }

    /* ===========================================
       전체 초기화
    =========================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont,
                   'Apple SD Gothic Neo', sans-serif;
      background: var(--color-bg);
      color: var(--color-ink);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    ::selection {
      background: rgba(26, 26, 46, 0.08);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ===========================================
       상단 네비게이션
    =========================================== */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      height: var(--nav-height);
    }

    .nav-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 24px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    /* 왼쪽: 모바일 전용 햄버거 + 로고 */
    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    /* 햄버거 버튼 — 모바일에서만 보임 (데스크톱은 사이드바 상시 오픈이므로 불필요) */
    .menu-btn {
      display: none; /* 기본 숨김 — 모바일에서만 표시 */
      width: 36px;
      height: 36px;
      border: 1px solid var(--color-border-md);
      border-radius: 8px;
      background: var(--color-white);
      cursor: pointer;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .menu-btn:hover {
      border-color: var(--color-ink);
      background: var(--color-surface);
    }

    .menu-btn.active {
      background: var(--color-ink);
      border-color: var(--color-ink);
    }

    .menu-btn.active .menu-line {
      background: #fff;
    }

    .menu-line {
      width: 16px;
      height: 1.5px;
      background: #64748b;
      border-radius: 1px;
      transition: all 0.2s;
    }

    /* 로고 */
    .nav-logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-ink);
      letter-spacing: -0.5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-logo::before {
      content: '';
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: var(--color-ink);
      flex-shrink: 0;
    }

    /* 오른쪽 영역 — nav-search-bar 제거 후 빈 영역 (nav-stat 등 추후 추가 가능) */
    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    /* ===========================================
       전체 레이아웃 — 사이드바 + 메인 병렬 배치
    =========================================== */
    /* nav 아래 전체를 flex로 감싸는 래퍼 */
    .content-wrapper {
      display: flex;
      max-width: 1440px;
      margin: 0 auto;
      min-height: calc(100vh - var(--nav-height));
    }

    /* ===========================================
       좌측 사이드바 — 데스크톱 상시 오픈
    =========================================== */

    /* 사이드바 배경 오버레이 — 모바일 전용 */
    .sidebar-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.15);
      z-index: 90;
      backdrop-filter: blur(2px);
    }

    /* 모바일에서 오버레이 활성화 */
    .sidebar-overlay.active {
      display: block;
      animation: fadeIn 0.15s ease;
    }

    /* 사이드바 본체 */
    .sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;

      /* 데스크톱: 화면 스크롤 따라 고정 (sticky) */
      position: sticky;
      top: var(--nav-height);
      height: calc(100vh - var(--nav-height));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;

      background: var(--color-white);
      border-right: 1px solid var(--color-border);

      /* 스크롤바 스타일 — 얇게 */
      scrollbar-width: thin;
      scrollbar-color: var(--color-border-md) transparent;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--color-border-md); border-radius: 4px; }

    /* 사이드바 내부 헤더 */
    .sidebar-header {
      padding: 24px 20px 14px;
      border-bottom: 1px solid var(--color-border);
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--color-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* 카테고리 리스트 */
    .sidebar-list {
      padding: 8px 10px 16px;
    }

    /* ===========================================
       사이드바 트리 구조 — 대분류(Daily/Annual 등) + 중분류(카테고리)
    =========================================== */

    /* 대분류 그룹 라벨 — "Daily", "Annual" 등 (클릭하면 접기/펼치기) */
    .sidebar-group-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--color-faint);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 12px 10px 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
    }

    .sidebar-group-label:first-child {
      padding-top: 6px;
    }

    .sidebar-group-label:hover {
      color: var(--color-muted);
    }

    /* 접기/펼치기 화살표 아이콘 */
    .sidebar-group-chevron {
      font-size: 10px;
      transition: transform 0.2s ease;
    }

    /* 접힌 상태 — 화살표 회전 */
    .sidebar-group-label.collapsed .sidebar-group-chevron {
      transform: rotate(-90deg);
    }

    /* 카테고리 그룹 내용물 래퍼 — 접기 애니메이션 */
    .sidebar-group-items {
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s ease;
      opacity: 1;
    }

    /* 접힌 상태 — 높이 0으로 숨김 */
    .sidebar-group-items.collapsed {
      max-height: 0 !important;
      opacity: 0;
      overflow: hidden;
    }

    /* 카테고리 버튼 — 들여쓰기로 중분류 표현 */
    .sidebar-cat {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 10px 10px 18px; /* 왼쪽 들여쓰기로 트리 느낌 */
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }

    .sidebar-cat:hover {
      background: var(--color-surface);
    }

    /* 현재 선택된 카테고리 하이라이트 */
    .sidebar-cat.active {
      background: var(--color-ink);
    }

    .sidebar-cat.active .sidebar-cat-name {
      color: var(--color-white);
    }

    .sidebar-cat.active .sidebar-cat-meta {
      color: rgba(255, 255, 255, 0.5);
    }

    .sidebar-cat.active .sidebar-cat-count {
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.8);
    }

    .sidebar-cat.active .sidebar-cat-dot {
      background: var(--color-white);
    }

    /* 카테고리 색상 점 */
    .sidebar-cat-dot {
      width: 7px;
      height: 7px;
      border-radius: 3px;
      background: var(--color-ink);
      flex-shrink: 0;
    }

    .sidebar-cat-info {
      flex: 1;
      min-width: 0;
    }

    .sidebar-cat-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-ink);
      line-height: 1.4;
    }

    .sidebar-cat-meta {
      font-size: 11px;
      color: var(--color-muted);
      margin-top: 1px;
    }

    .sidebar-cat-count {
      font-size: 11px;
      font-weight: 600;
      color: var(--color-muted);
      background: var(--color-border);
      padding: 2px 7px;
      border-radius: 8px;
      flex-shrink: 0;
    }

    /* 사이드바 하단 통계 — 히어로에서 이동 */
    .sidebar-stats {
      padding: 16px 20px 24px;
      border-top: 1px solid var(--color-border);
      margin-top: auto;
    }

    .sidebar-stats-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--color-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* 통계 항목 3개 */
    .sidebar-stat-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-stat-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-stat-label {
      font-size: 12px;
      color: var(--color-muted);
    }

    .sidebar-stat-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--color-ink);
    }

    /* 빈 상태 */
    .sidebar-empty {
      padding: 48px 20px;
      text-align: center;
      color: var(--color-faint);
      font-size: 13px;
    }

    /* ===========================================
       메인 콘텐츠 영역
    =========================================== */
    .main {
      flex: 1;
      min-width: 0; /* flex 자식의 넘침 방지 */
      padding: 0 32px;
    }

    /* 뷰 전환 애니메이션 */
    .view {
      display: none;
    }

    .view.active {
      display: block;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===========================================
       메인 인라인 검색 바 — 히어로 자리에 큰 검색
       페이지 열면 바로 보이고 검색할 수 있음
    =========================================== */
    .main-search {
      padding: 28px 0 20px;
    }

    /* 검색 입력 감싸는 래퍼 (아이콘 + 입력 + 버튼 배치용) */
    .main-search-wrap {
      position: relative;
    }

    /* 돋보기 아이콘 — 입력 필드 왼쪽에 고정 */
    .main-search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--color-muted);
      pointer-events: none;
    }

    /* 큰 검색 입력 필드 — 히어로 대신 메인에 배치 */
    .main-search-input {
      width: 100%;
      padding: 16px 52px 16px 50px;
      border: 1.5px solid var(--color-border-md);
      border-radius: 14px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 400;
      color: var(--color-ink);
      background: var(--color-white);
      outline: none;
      transition: all 0.2s;
      letter-spacing: -0.3px;
    }

    .main-search-input:focus {
      border-color: var(--color-ink);
      box-shadow: 0 0 0 3px rgba(26, 26, 46, 0.06);
    }

    .main-search-input::placeholder {
      color: var(--color-faint);
      font-weight: 300;
    }

    /* 검색 지우기 × 버튼 — 검색어 있을 때만 표시 */
    .main-search-clear {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border: none;
      background: var(--color-border);
      border-radius: 8px;
      cursor: pointer;
      color: var(--color-muted);
      font-size: 16px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-search-clear:hover {
      background: var(--color-border-md);
      color: var(--color-ink);
    }

    /* / 키캡 — 검색어 비어있을 때 표시되는 단축키 안내 */
    .main-search-kbd {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-family: inherit;
      font-size: 12px;
      color: var(--color-faint);
      padding: 2px 8px;
      background: var(--color-surface);
      border-radius: 5px;
      border: 1px solid var(--color-border-md);
      pointer-events: none;
    }

    /* 인라인 검색 결과 카운트 */
    .main-search-count {
      font-size: 13px;
      color: var(--color-muted);
      margin-bottom: 16px;
      padding: 0 4px;
    }

    /* ===========================================
       필터/정렬 바
    =========================================== */
    .filter-sort-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--color-border);
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      flex-shrink: 0;
    }

    /* 카테고리 필터 칩 */
    .filter-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex: 1;
    }

    .filter-chip {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--color-border-md);
      background: var(--color-white);
      color: #64748b;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      white-space: nowrap;
    }

    .filter-chip:hover {
      border-color: var(--color-ink);
      color: var(--color-ink);
      background: var(--color-surface);
    }

    .filter-chip.active {
      background: var(--color-ink);
      color: var(--color-white);
      border-color: var(--color-ink);
    }

    /* 정렬 셀렉트 */
    .sort-select {
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--color-border-md);
      border-radius: 8px;
      background: var(--color-white);
      color: #64748b;
      font-family: inherit;
      cursor: pointer;
      flex-shrink: 0;
    }

    .sort-select:focus {
      outline: none;
      border-color: var(--color-ink);
    }

    /* 구분선 */
    .filter-sep {
      width: 1px;
      height: 20px;
      background: var(--color-border-md);
      flex-shrink: 0;
    }

    /* ===========================================
       카테고리 컬러 — 블랙/화이트 통일
    =========================================== */
    [class*="cat-color-"] { --cat-color: #1a1a2e; --cat-bg: #f1f5f9; }

    /* ===========================================
       주요지표 배지 — 투자 데일리 카테고리(cat_003)
    =========================================== */
    /* 배지 컨테이너 */
    .key-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin: 10px 0 4px;
    }

    /* 개별 배지 */
    .metric-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      white-space: nowrap;
    }

    /* extra 항목 — 구분용 점선 테두리 */
    .metric-badge.extra {
      border-style: dashed;
      opacity: 0.9;
    }

    /* 라벨: 회색 */
    .metric-label {
      color: #64748b;
      font-weight: 500;
    }

    /* 값: 기본 텍스트 */
    .metric-value {
      color: var(--color-ink);
    }

    /* 변동 방향 색상 */
    .metric-change.dir-up   { color: var(--color-up); }
    .metric-change.dir-down { color: var(--color-down); }
    .metric-change.dir-flat { color: var(--color-flat); }

    /* ===========================================
       보고서 카드
    =========================================== */
    .article-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .article-card {
      background: var(--color-white);
      border: 1px solid var(--color-border);
      border-radius: 14px;
      padding: 22px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
    }

    .article-card:hover {
      border-color: var(--color-border-md);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      transform: translateY(-2px);
    }

    /* 카드 상단: 카테고리 라벨 */
    .article-card-cat {
      font-size: 11px;
      font-weight: 600;
      color: var(--cat-color, #1a1a2e);
      background: var(--cat-bg, #f1f5f9);
      padding: 3px 10px;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 12px;
      width: fit-content;
    }

    .article-card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-ink);
      letter-spacing: -0.3px;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .article-card-summary {
      font-size: 13px;
      color: var(--color-muted);
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 14px;
      flex: 1;
    }

    /* 출처 품질 바 */
    .source-bar {
      display: flex;
      gap: 3px;
      height: 3px;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 10px;
      background: var(--color-border);
    }

    .source-bar-a { background: var(--color-ink); border-radius: 2px; }
    .source-bar-b { background: var(--color-muted); }
    .source-bar-c { background: var(--color-border-md); }

    .article-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .article-card-date {
      font-size: 11px;
      color: var(--color-faint);
    }

    .article-card-sources {
      font-size: 11px;
      color: var(--color-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .source-dot {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-weight: 500;
    }

    .source-dot::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .source-dot.grade-a::before { background: var(--color-ink); }
    .source-dot.grade-b::before { background: var(--color-muted); }
    .source-dot.grade-c::before { background: var(--color-border-md); }

    .article-card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .article-tag {
      font-size: 11px;
      color: var(--color-muted);
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s;
    }

    .article-tag:hover {
      color: var(--color-ink);
    }

    .article-tag::before {
      content: '#';
      color: var(--color-faint);
    }

    /* 빈 상태 */
    .empty {
      text-align: center;
      padding: 100px 20px;
      grid-column: 1 / -1;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-muted);
      margin-bottom: 8px;
    }

    .empty-desc {
      font-size: 14px;
      color: var(--color-faint);
      line-height: 1.8;
    }

    /* ===========================================
       보고서 섹션 헤더
    =========================================== */
    .section-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 0 16px;
    }

    .section-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-ink);
    }

    .section-count {
      font-size: 12px;
      color: var(--color-muted);
    }

    .recent-section {
      padding-bottom: 80px;
    }

    /* ===========================================
       홈 대시보드 — 유튜브 채널 스타일 선반(Shelf) 레이아웃
       카테고리별로 가로 스크롤 카드 선반 배치
    =========================================== */

    /* 카테고리 선반 하나 — 유튜브의 재생목록 행 */
    .shelf {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--color-border);
    }

    .shelf:last-child {
      border-bottom: none;
    }

    /* 선반 헤더: 대분류명 + 편수 + 전체보기 */
    .shelf-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 0 2px;
    }

    .shelf-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .shelf-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-ink);
      letter-spacing: -0.4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 카드 안 카테고리 라벨 — 대분류에 여러 리포트 시리즈가 있을 때 구분용 */
    .shelf-card-cat {
      font-size: 10px;
      font-weight: 600;
      color: var(--color-muted);
      letter-spacing: 0.02em;
      margin-bottom: 2px;
    }

    .shelf-count {
      font-size: 13px;
      color: var(--color-muted);
      font-weight: 500;
      flex-shrink: 0;
    }

    .shelf-more {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-muted);
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      padding: 6px 14px;
      border-radius: 8px;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .shelf-more:hover {
      background: var(--color-surface);
      color: var(--color-ink);
    }

    /* 카드 가로 스크롤 트랙 — 유튜브 동영상 행처럼 */
    .shelf-track {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 6px;
      scrollbar-width: thin;
      scrollbar-color: var(--color-border-md) transparent;
    }

    .shelf-track::-webkit-scrollbar {
      height: 4px;
    }

    .shelf-track::-webkit-scrollbar-track {
      background: transparent;
    }

    .shelf-track::-webkit-scrollbar-thumb {
      background: var(--color-border-md);
      border-radius: 4px;
    }

    /* 개별 카드 — 유튜브 비디오 카드 스타일 */
    .shelf-card {
      flex-shrink: 0;
      width: 240px;
      background: var(--color-white);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 18px 18px 14px;
      cursor: pointer;
      transition: all 0.2s;
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
    }

    .shelf-card:hover {
      border-color: var(--color-border-md);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
      transform: translateY(-2px);
    }

    /* 카드 상단: 날짜 */
    .shelf-card-date {
      font-size: 11px;
      font-weight: 600;
      color: var(--color-muted);
      margin-bottom: 8px;
    }

    /* 카드 제목 — 2줄까지 */
    .shelf-card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-ink);
      letter-spacing: -0.2px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 10px;
      flex: 1;
    }

    /* 카드 요약 — 1줄 */
    .shelf-card-summary {
      font-size: 12px;
      color: var(--color-muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 10px;
    }

    /* 카드 하단 태그 */
    .shelf-card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: auto;
    }

    .shelf-card-tag {
      font-size: 11px;
      color: var(--color-faint);
      font-weight: 500;
    }

    .shelf-card-tag::before {
      content: '#';
      color: var(--color-border-md);
    }

    /* 빈 카테고리 안내 */
    .shelf-empty {
      font-size: 13px;
      color: var(--color-faint);
      padding: 20px 0;
    }

    /* 반응형 — 모바일 */
    @media (max-width: 860px) {
      .shelf {
        margin-bottom: 12px;
        padding-bottom: 12px;
      }
      .shelf-name {
        font-size: 16px;
      }
      .shelf-card {
        width: 200px;
        padding: 14px 14px 12px;
      }
      .shelf-card-title {
        font-size: 13px;
      }
      .shelf-card-summary {
        display: none;
      }
    }

    /* ===========================================
       타임라인 (카테고리 내 보고서 목록)
    =========================================== */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--color-muted);
      cursor: pointer;
      padding: 28px 0 0;
      transition: color 0.2s;
      border: none;
      background: none;
      font-family: inherit;
      font-weight: 500;
    }

    .back-link:hover {
      color: var(--color-ink);
    }

    /* ===========================================
       대분류 상세 뷰 — 세부 카테고리 목록
    =========================================== */
    .freq-group-header {
      padding: 24px 0 20px;
    }

    .freq-group-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--color-ink);
      letter-spacing: -0.5px;
    }

    .freq-group-meta {
      font-size: 13px;
      color: var(--color-muted);
      margin-top: 4px;
    }

    /* 세부 카테고리 카드 — 네이버 포스트 채널 목록 스타일 */
    .freq-cat-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      background: var(--color-white);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .freq-cat-card:hover {
      border-color: var(--color-border-md);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
    }

    .freq-cat-left {
      min-width: 0;
    }

    .freq-cat-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--color-ink);
    }

    .freq-cat-desc {
      font-size: 13px;
      color: var(--color-muted);
      margin-top: 4px;
      line-height: 1.4;
    }

    .freq-cat-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      color: var(--color-muted);
    }

    .freq-cat-count {
      font-size: 14px;
      font-weight: 600;
    }

    .freq-cat-latest {
      font-size: 12px;
      color: var(--color-faint);
    }

    .timeline-header {
      padding: 24px 0 36px;
      border-bottom: 1px solid var(--color-border);
    }

    .timeline-name {
      font-size: 26px;
      font-weight: 700;
      color: var(--color-ink);
      letter-spacing: -1px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .timeline-color-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .timeline-meta {
      font-size: 14px;
      color: var(--color-muted);
    }

    .timeline-list {
      display: flex;
      flex-direction: column;
    }

    .timeline-item {
      display: flex;
      gap: 28px;
      padding: 28px 0;
      border-bottom: 1px solid var(--color-surface);
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 10px;
    }

    .timeline-item:last-child {
      border-bottom: none;
    }

    .timeline-item:hover {
      background: #fafbfd;
      padding-left: 14px;
      padding-right: 14px;
      margin: 0 -14px;
    }

    .timeline-item-date {
      width: 100px;
      flex-shrink: 0;
      padding-top: 4px;
    }

    .timeline-item-period {
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 4px;
    }

    .timeline-item-day {
      font-size: 11px;
      color: var(--color-faint);
    }

    .timeline-item-body {
      flex: 1;
      min-width: 0;
    }

    .timeline-item-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--color-ink);
      letter-spacing: -0.3px;
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .timeline-item-summary {
      font-size: 13px;
      color: var(--color-muted);
      line-height: 1.8;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .timeline-item-footer {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* ===========================================
       보고서 뷰어
    =========================================== */
    .viewer-header {
      padding: 28px 0 24px;
      border-bottom: 1px solid var(--color-border);
      margin-bottom: 0;
    }

    .viewer-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--color-ink);
      letter-spacing: -0.5px;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .viewer-meta {
      font-size: 13px;
      color: var(--color-muted);
    }

    /* 리포트 요약 박스 */
    .viewer-summary {
      background: #f8f9fb;
      border: 1px solid #e8ecf1;
      border-radius: 8px;
      padding: 22px 26px;
      margin-bottom: 20px;
    }

    .viewer-summary-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 12px;
    }

    .viewer-summary-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .viewer-summary-list li {
      display: flex;
      gap: 10px;
      font-size: 14px;
      color: var(--color-ink);
      line-height: 1.65;
    }

    .viewer-summary-list li .sum-num {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--color-ink);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 3px;
    }

    /* ===========================================
       보고서 내비게이션 — 같은 카테고리 목록 + 이전/다음 화살표
       viewerSummary 아래, reportIframe 위에 배치
    =========================================== */
    .report-nav {
      border: 1px solid var(--color-border-md);
      border-radius: 10px;
      margin-bottom: 20px;
      overflow: hidden;
      background: var(--color-white);
    }

    /* 내비게이션 상단: 제목 + 이전/다음 버튼 */
    .report-nav-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface);
    }

    /* 카테고리명 + 편수 표시 */
    .report-nav-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-muted);
      letter-spacing: -0.2px;
    }

    /* 이전/다음 버튼 묶음 */
    .report-nav-arrows {
      display: flex;
      gap: 6px;
    }

    /* 이전/다음 화살표 버튼 */
    .report-nav-arrows button {
      padding: 4px 10px;
      border: 1px solid var(--color-border-md);
      border-radius: 6px;
      background: var(--color-white);
      color: #64748b;
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .report-nav-arrows button:hover:not(:disabled) {
      border-color: var(--color-ink);
      color: var(--color-ink);
      background: var(--color-surface);
    }

    /* 비활성화(처음/마지막 보고서) */
    .report-nav-arrows button:disabled {
      opacity: 0.35;
      cursor: default;
    }

    /* 보고서 목록 — 가로 스크롤 */
    .report-nav-list {
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .report-nav-list::-webkit-scrollbar { display: none; }

    /* 개별 보고서 항목 */
    .report-nav-item {
      flex-shrink: 0;
      padding: 10px 16px;
      border-right: 1px solid var(--color-border);
      cursor: pointer;
      transition: background 0.15s;
      min-width: 0;
      max-width: 200px;
    }

    .report-nav-item:last-child {
      border-right: none;
    }

    .report-nav-item:hover {
      background: var(--color-surface);
    }

    /* 현재 보고서 — 검정 배경으로 하이라이트 */
    .report-nav-item.current {
      background: var(--color-ink);
    }

    .report-nav-item.current .report-nav-item-title {
      color: var(--color-white);
    }

    .report-nav-item.current .report-nav-item-date {
      color: rgba(255, 255, 255, 0.5);
    }

    .report-nav-item-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-ink);
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .report-nav-item-date {
      font-size: 11px;
      color: var(--color-faint);
      margin-top: 2px;
    }

    /* 리포트 본문을 직접 삽입하는 컨테이너 (iframe 대체) */
    .report-embed {
      width: 100%;
      background: var(--color-white);
      display: block;
    }

    /* ===========================================
       푸터
    =========================================== */
    .footer {
      text-align: center;
      padding: 48px 0 32px;
      font-size: 12px;
      color: var(--color-faint);
    }

    /* ===========================================
       반응형 — 모바일 (<=860px): 사이드바 토글 방식으로
    =========================================== */
    @media (max-width: 860px) {
      /* 모바일: 사이드바 position 변경 — fixed로 슬라이드 */
      .sidebar {
        position: fixed;
        top: var(--nav-height);
        left: 0;
        bottom: 0;
        width: 280px;
        transform: translateX(-100%);
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 95;
        height: auto;
      }

      /* 열린 상태 */
      .sidebar.open {
        transform: translateX(0);
        box-shadow: 8px 0 24px rgba(0, 0, 0, 0.06);
      }

      /* 모바일: 사이드바가 fixed이므로 메인은 전체 너비 사용 */
      .content-wrapper {
        display: block;
      }

      .main {
        padding: 0 20px;
      }

      /* 모바일: 햄버거 버튼 표시 */
      .menu-btn {
        display: flex;
      }

      /* 모바일: 인라인 검색 여백 줄이기 */
      .main-search {
        padding: 20px 0 14px;
      }

      .main-search-input {
        font-size: 15px;
        padding: 14px 48px 14px 44px;
      }

      .main-search-icon {
        left: 14px;
        width: 18px;
        height: 18px;
      }

      .nav-inner {
        padding: 0 16px;
      }

      .article-grid {
        grid-template-columns: 1fr;
      }

      .timeline-item {
        flex-direction: column;
        gap: 6px;
      }

      .timeline-item-date {
        width: auto;
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .filter-sort-bar { gap: 8px; }

      /* 모바일: 보고서 내비게이션 버튼 텍스트 짧게 */
      .report-nav-item {
        max-width: 160px;
      }
    }

    @media (max-width: 600px) {
      .filter-chips {
        overflow-x: auto;
        flex-wrap: nowrap;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }

      .filter-chips::-webkit-scrollbar { display: none; }

      /* 모바일에서 지표 배지 작게 */
      .metric-badge {
        font-size: 10px;
        padding: 2px 6px;
      }
    }
  </style>
</head>

<body>

  <!-- ===========================================
       상단 네비게이션
  =========================================== -->
  <nav class="nav">
    <div class="nav-inner">
      <div class="nav-left">
        <!-- 모바일 전용 햄버거 버튼 — 데스크톱에서는 display:none -->
        <button class="menu-btn" id="menuBtn" title="카테고리 메뉴">
          <span class="menu-line"></span>
          <span class="menu-line"></span>
          <span class="menu-line"></span>
        </button>
        <!-- 로고 — 클릭하면 홈으로 -->
        <div class="nav-logo" id="navLogo">DeepDig</div>
      </div>

      <!-- nav-right: 검색 바 제거 후 빈 영역 (통계 등 추가 가능) -->
      <div class="nav-right"></div>
    </div>
  </nav>

  <!-- ===========================================
       모바일 전용 사이드바 오버레이 (클릭하면 닫힘)
  =========================================== -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ===========================================
       전체 레이아웃 래퍼 — 사이드바 + 메인 병렬 배치
  =========================================== -->
  <div class="content-wrapper">

    <!-- 좌측 사이드바 — 데스크톱: sticky 상시 오픈 / 모바일: 토글 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">카테고리</div>
      </div>
      <!-- 카테고리 목록: JS로 동적 생성 (트리 구조) -->
      <div class="sidebar-list" id="sidebarList"></div>

      <!-- 사이드바 하단 통계 (히어로에서 이동) -->
      <div class="sidebar-stats">
        <div class="sidebar-stats-title">통계</div>
        <div class="sidebar-stat-row">
          <div class="sidebar-stat-item">
            <span class="sidebar-stat-label">카테고리</span>
            <span class="sidebar-stat-value" id="statCategories">0</span>
          </div>
          <div class="sidebar-stat-item">
            <span class="sidebar-stat-label">보고서</span>
            <span class="sidebar-stat-value" id="statReports">0</span>
          </div>
          <div class="sidebar-stat-item">
            <span class="sidebar-stat-label">검증된 출처</span>
            <span class="sidebar-stat-value" id="statSources">0</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- ===========================================
         메인 콘텐츠
    =========================================== -->
    <main class="main">

      <!-- 뷰 1: 홈 -->
      <div id="viewHome" class="view active">

        <!-- 인라인 검색 바 — 히어로 자막 대신 바로 검색 가능 -->
        <div class="main-search">
          <div class="main-search-wrap">
            <!-- 돋보기 아이콘 -->
            <svg class="main-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="M21 21l-4.35-4.35"></path>
            </svg>
            <!-- 검색 입력 필드 -->
            <input type="text" class="main-search-input" id="mainSearchInput" placeholder="보고서를 검색하세요" autocomplete="off">
            <!-- / 단축키 안내 (검색어 없을 때만 보임) -->
            <kbd class="main-search-kbd" id="mainSearchKbd">/</kbd>
            <!-- × 지우기 버튼 (검색어 있을 때만 보임) -->
            <button class="main-search-clear" id="mainSearchClear" style="display:none">&times;</button>
          </div>
        </div>

        <!-- 인라인 검색 결과 — 검색 중일 때 필터/카드 대신 여기에 결과 표시 -->
        <div id="mainSearchResults" style="display:none">
          <div class="main-search-count" id="mainSearchCount"></div>
          <div class="article-grid" id="mainSearchList"></div>
        </div>

        <!-- 대분류별 그룹 대시보드 — JS가 동적으로 렌더링 -->
        <div id="homeDashboard"></div>

        <div class="footer">research-crawler가 자동으로 수집한 조사 보고서</div>
      </div>

      <!-- 뷰 1.5: 대분류 상세 — 세부 카테고리 목록 (네이버 포스트 스타일) -->
      <div id="viewFreqGroup" class="view">
        <button class="back-link" id="backFromFreq">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 5l-7 7 7 7"></path>
          </svg>
          홈
        </button>

        <div class="freq-group-header">
          <h2 class="freq-group-title" id="freqGroupTitle"></h2>
          <div class="freq-group-meta" id="freqGroupMeta"></div>
        </div>

        <div class="freq-group-list" id="freqGroupList"></div>
        <div class="footer"></div>
      </div>

      <!-- 뷰 2: 타임라인 -->
      <div id="viewTimeline" class="view">
        <button class="back-link" id="backToHome">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 5l-7 7 7 7"></path>
          </svg>
          전체 목록
        </button>

        <div class="timeline-header">
          <h2 class="timeline-name" id="timelineName"></h2>
          <div class="timeline-meta" id="timelineMeta"></div>
        </div>

        <div class="timeline-list" id="timelineList"></div>
        <div class="footer"></div>
      </div>

      <!-- 뷰 3: 보고서 뷰어 -->
      <div id="viewReport" class="view">
        <button class="back-link" id="backFromReport">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 5l-7 7 7 7"></path>
          </svg>
          <span id="backFromReportText">목록으로</span>
        </button>

        <div class="viewer-header">
          <h2 class="viewer-title" id="viewerTitle"></h2>
          <div class="viewer-meta" id="viewerMeta"></div>
        </div>

        <!-- 리포트 요약 박스 — summaryPoints 넘버링 리스트 -->
        <div class="viewer-summary" id="viewerSummary"></div>

        <!-- 같은 카테고리 보고서 내비게이션 — 보고서 1개면 숨김 -->
        <div class="report-nav" id="reportNav" style="display:none">
          <div class="report-nav-header">
            <span class="report-nav-title" id="reportNavTitle"></span>
            <div class="report-nav-arrows">
              <!-- 이전 = 더 오래된 보고서 -->
              <button id="reportNavPrev">← 이전</button>
              <!-- 다음 = 더 최신 보고서 -->
              <button id="reportNavNext">다음 →</button>
            </div>
          </div>
          <!-- 같은 카테고리 보고서 목록 (최신순, 가로 스크롤) -->
          <div class="report-nav-list" id="reportNavList"></div>
        </div>

        <!-- 리포트 본문이 직접 삽입되는 영역 (iframe 대체 — 스크롤 통합) -->
        <div id="reportEmbed" class="report-embed"></div>
        <div class="footer"></div>
      </div>

    </main>
  </div><!-- /.content-wrapper -->

  <script>
    // ===========================================
    // DeepDig 앱 로직
    // ===========================================

    // 현재 선택된 카테고리 ID (null = 전체)
    let currentCategoryId = null;
    // 검색에서 보고서를 열었는지 여부
    let openedFromSearch = false;
    // 카테고리 필터 상태 ('all' 또는 카테고리 ID)
    let activeFilter = 'all';
    // 정렬 모드
    let currentSortMode = 'newest';
    // history.pushState 사용 여부 (popstate 핸들러에서 false로 전환)
    let pushHistoryState = true;
    // 현재 열려있는 보고서 ID (뷰어에서 이전/다음 탐색용)
    let currentReportId = null;
    // 현재 선택된 대분류 (daily/weekly/annual — freqGroup 뷰에서 사용)
    let currentFreq = null;

    // -----------------------------------------------
    // registry.js 데이터 가져오기
    // -----------------------------------------------
    function getData() {
      // ARCHIVE_REGISTRY가 없으면 빈 구조 반환
      if (!window.ARCHIVE_REGISTRY) {
        return { categories: [], reports: [] };
      }
      return window.ARCHIVE_REGISTRY;
    }

    // 카테고리 컬러 — 블랙 통일
    function getCatColorClass() { return 'cat-color-default'; }
    function getCatColorValue() { return '#1a1a2e'; }

    // -----------------------------------------------
    // 주요지표 배지 HTML 생성 — cat_003 투자 데일리 전용
    // -----------------------------------------------
    function keyMetricsHtml(report) {
      // keyMetrics 배열이 없으면 빈 문자열 반환
      if (!report.keyMetrics || report.keyMetrics.length === 0) return '';

      // 각 지표를 배지로 변환
      const badges = report.keyMetrics.map(m => {
        // 방향에 따른 CSS 클래스: up=빨강, down=파랑, flat=회색 (한국 증시 관례)
        const dirClass = 'dir-' + (m.dir || 'flat');
        // extra 항목은 점선 테두리로 구분
        const extraClass = m.extra ? ' extra' : '';

        // 값이 있을 때만 표시 (—은 숨김)
        const valueHtml = (m.value && m.value !== '—')
          ? '<span class="metric-value">' + m.value + '</span>'
          : '';

        // 변동이 있을 때만 표시
        const changeHtml = (m.change && m.change !== '—')
          ? '<span class="metric-change ' + dirClass + '">' + m.change + '</span>'
          : '';

        return '<span class="metric-badge' + extraClass + '">' +
          '<span class="metric-label">' + m.label + '</span>' +
          valueHtml +
          changeHtml +
          '</span>';
      }).join('');

      return '<div class="key-metrics">' + badges + '</div>';
    }

    // -----------------------------------------------
    // 화면 전환 — 브라우저 뒤로가기 지원
    // -----------------------------------------------
    function showView(viewId) {
      // 모든 뷰를 숨기고 해당 뷰만 보이게 함
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      const el = document.getElementById(viewId);
      if (el) {
        requestAnimationFrame(() => {
          el.classList.add('active');
          window.scrollTo(0, 0);
        });
      }
    }

    // 브라우저 뒤로가기/앞으로가기 처리
    window.addEventListener('popstate', (e) => {
      pushHistoryState = false;
      const state = e.state;
      if (!state || state.view === 'home') {
        currentCategoryId = null;
        activeFilter = 'all';
        showView('viewHome');
        renderHome();
        updateSidebarActive(null);
      } else if (state.view === 'freqGroup') {
        openFreqGroup(state.freq);
      } else if (state.view === 'timeline') {
        openTimeline(state.categoryId);
      } else if (state.view === 'report') {
        const data = getData();
        const report = data.reports.find(r => r.id === state.reportId);
        if (report) openReport(report, false);
      }
      pushHistoryState = true;
    });

    // 날짜 포맷: "2026-03-03" → "2026.03.03"
    function fmtDate(d) {
      return d ? d.replace(/-/g, '.') : '';
    }

    // 출처 통계 HTML 조각 생성
    function sourcesHtml(sources) {
      if (!sources) return '';
      const parts = [];
      if (sources.gradeA > 0) parts.push('<span class="source-dot grade-a">A ' + sources.gradeA + '</span>');
      if (sources.gradeB > 0) parts.push('<span class="source-dot grade-b">B ' + sources.gradeB + '</span>');
      if (sources.gradeC > 0) parts.push('<span class="source-dot grade-c">C ' + sources.gradeC + '</span>');
      return '<div class="article-card-sources">' + parts.join('') + '</div>';
    }

    // 출처 품질 프로그레스 바 HTML 생성
    function sourceBarHtml(sources) {
      if (!sources || !sources.total) return '';
      const total = sources.total;
      const aWidth = Math.round((sources.gradeA / total) * 100);
      const bWidth = Math.round((sources.gradeB / total) * 100);
      const cWidth = Math.round((sources.gradeC / total) * 100);
      return '<div class="source-bar" title="출처 ' + total + '개 (A:' + sources.gradeA + ' B:' + sources.gradeB + ' C:' + sources.gradeC + ')">' +
        (aWidth > 0 ? '<div class="source-bar-a" style="flex:' + aWidth + '"></div>' : '') +
        (bWidth > 0 ? '<div class="source-bar-b" style="flex:' + bWidth + '"></div>' : '') +
        (cWidth > 0 ? '<div class="source-bar-c" style="flex:' + cWidth + '"></div>' : '') +
      '</div>';
    }

    // -----------------------------------------------
    // 사이드바 — 모바일 전용 토글 (데스크톱은 상시 오픈)
    // -----------------------------------------------
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      const btn = document.getElementById('menuBtn');
      const isOpen = sidebar.classList.contains('open');

      if (isOpen) {
        sidebar.classList.remove('open');
        overlay.classList.remove('active');
        btn.classList.remove('active');
      } else {
        sidebar.classList.add('open');
        overlay.classList.add('active');
        btn.classList.add('active');
      }
    }

    function closeSidebar() {
      // 모바일에서 열린 사이드바 닫기
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('active');
      const btn = document.getElementById('menuBtn');
      if (btn) btn.classList.remove('active');
    }

    // 사이드바 현재 선택 항목 하이라이트 업데이트
    function updateSidebarActive(categoryId) {
      document.querySelectorAll('.sidebar-cat').forEach(btn => {
        if (btn.getAttribute('data-id') === categoryId) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    }

    // -----------------------------------------------
    // 사이드바 카테고리 목록 — 트리 구조로 렌더링
    // 대분류 순서: Daily → Weekly → Monthly → Annual
    // -----------------------------------------------
    function renderSidebar() {
      const data = getData();
      const cats = data.categories || [];
      const reports = data.reports || [];
      const container = document.getElementById('sidebarList');

      if (cats.length === 0) {
        container.innerHTML = '<div class="sidebar-empty">아직 카테고리가 없습니다</div>';
        return;
      }

      // 대분류 순서 정의 — Daily가 제일 위에 오도록
      const frequencyOrder = ['daily', 'weekly', 'monthly', 'annual'];
      // 한국어 라벨 매핑
      const frequencyLabel = {
        daily: 'Daily',
        weekly: 'Weekly',
        monthly: 'Monthly',
        annual: 'Annual'
      };

      // 카테고리를 frequency별로 그룹화
      const groups = {};
      cats.forEach(cat => {
        // frequency 없으면 'annual'로 기본값 처리
        const freq = (cat.frequency || 'annual').toLowerCase();
        if (!groups[freq]) groups[freq] = [];
        groups[freq].push(cat);
      });

      // 트리 HTML 생성 — 비어있는 대분류는 생략
      let html = '';
      frequencyOrder.forEach(freq => {
        if (!groups[freq] || groups[freq].length === 0) return;

        // 대분류 라벨 — 클릭하면 하위 카테고리 접기/펼치기
        html += '<div class="sidebar-group-label" data-freq="' + freq + '">' +
          (frequencyLabel[freq] || freq) +
          '<span class="sidebar-group-chevron">▾</span>' +
        '</div>';

        // 하위 카테고리 묶음 — 접기/펼치기 대상
        html += '<div class="sidebar-group-items" data-freq="' + freq + '">';
        groups[freq].forEach(cat => {
          const catReports = reports.filter(r => r.categoryId === cat.id);
          const sorted = [...catReports].sort((a, b) => new Date(b.date) - new Date(a.date));
          const lastDate = sorted.length > 0 ? fmtDate(sorted[0].date) : '';

          html += '<button class="sidebar-cat" data-id="' + cat.id + '">' +
            '<span class="sidebar-cat-dot"></span>' +
            '<div class="sidebar-cat-info">' +
              '<div class="sidebar-cat-name">' + cat.name + '</div>' +
              (lastDate ? '<div class="sidebar-cat-meta">최근 ' + lastDate + '</div>' : '') +
            '</div>' +
            '<span class="sidebar-cat-count">' + catReports.length + '</span>' +
          '</button>';
        });
        html += '</div>';
      });

      container.innerHTML = html;

      // 대분류 라벨 클릭 → 접기/펼치기 토글
      container.querySelectorAll('.sidebar-group-label').forEach(label => {
        const freq = label.getAttribute('data-freq');
        const items = container.querySelector('.sidebar-group-items[data-freq="' + freq + '"]');

        // 초기 상태: 모두 접기 (사용자가 필요할 때 펼침)
        if (items) {
          items.classList.add('collapsed');
          label.classList.add('collapsed');
        }

        label.addEventListener('click', () => {
          const items = container.querySelector('.sidebar-group-items[data-freq="' + freq + '"]');
          if (!items) return;

          const isCollapsed = items.classList.contains('collapsed');
          if (isCollapsed) {
            // 펼치기
            items.classList.remove('collapsed');
            label.classList.remove('collapsed');
            items.style.maxHeight = items.scrollHeight + 'px';
          } else {
            // 접기
            items.classList.add('collapsed');
            label.classList.add('collapsed');
          }
        });
      });

      // 카테고리 클릭 → 타임라인 열기
      container.querySelectorAll('.sidebar-cat').forEach(btn => {
        btn.addEventListener('click', () => {
          closeSidebar(); // 모바일에서는 사이드바 닫기
          openTimeline(btn.getAttribute('data-id'));
        });
      });

      // 현재 선택 상태 표시
      updateSidebarActive(currentCategoryId);
    }

    // -----------------------------------------------
    // 보고서 정렬
    // -----------------------------------------------
    function sortReports(reports, mode) {
      const sorted = [...reports];
      switch (mode) {
        case 'newest':  return sorted.sort((a, b) => new Date(b.date) - new Date(a.date));
        case 'oldest':  return sorted.sort((a, b) => new Date(a.date) - new Date(b.date));
        case 'sources': return sorted.sort((a, b) => (b.sources?.total || 0) - (a.sources?.total || 0));
        case 'name':    return sorted.sort((a, b) => a.title.localeCompare(b.title, 'ko'));
        default:        return sorted;
      }
    }

    // -----------------------------------------------
    // 홈 화면 렌더링 — 대분류별 그룹 대시보드
    // -----------------------------------------------
    function renderHome() {
      const data = getData();
      const cats = data.categories || [];
      const reports = data.reports || [];

      // 사이드바 하단 통계 업데이트
      document.getElementById('statCategories').textContent = cats.length;
      document.getElementById('statReports').textContent = reports.length;
      const totalSources = reports.reduce((sum, r) => sum + (r.sources?.total || 0), 0);
      document.getElementById('statSources').textContent = totalSources;

      // 사이드바 카테고리 목록 렌더링
      renderSidebar();

      // 대시보드 렌더링
      renderDashboard();
    }

    // -----------------------------------------------
    // 대시보드 — 유튜브 채널 스타일 선반(Shelf) 레이아웃
    // 각 카테고리가 가로 스크롤 카드 행으로 표시됨
    // 카테고리는 frequency 순서(Daily → Weekly → Annual)로 정렬
    // -----------------------------------------------
    function renderDashboard() {
      const data = getData();
      const cats = data.categories || [];
      const reports = data.reports || [];
      const container = document.getElementById('homeDashboard');

      // 대분류 순서 — 데일리 → 주간 → 월간 → 연간
      const freqOrder = ['daily', 'weekly', 'monthly', 'annual'];
      // 대분류 한국어 이름
      const freqNames = { daily: 'Daily New', weekly: 'Weekly New', monthly: 'Monthly New', annual: 'Annual New' };
      // 카드 최대 표시 수
      const cardLimit = 4;

      let html = '';

      // frequency 기준으로 그룹핑 (리포트별이 아닌 데일리/주간/연간 대분류)
      freqOrder.forEach(freq => {
        // 이 frequency에 속하는 카테고리들
        const freqCats = cats.filter(c => (c.frequency || 'annual').toLowerCase() === freq);
        if (freqCats.length === 0) return;

        // 이 frequency의 모든 리포트 수집 (최신순)
        const freqReports = reports
          .filter(r => freqCats.some(c => c.id === r.categoryId))
          .sort((a, b) => new Date(b.date) - new Date(a.date));

        if (freqReports.length === 0) return;

        const displayReports = freqReports.slice(0, cardLimit);
        const freqLabel = freqNames[freq] || freq;

        // 하나의 선반 시작
        html += '<div class="shelf">';

        // 선반 헤더: 대분류명 + 편수 + 전체보기
        html += '<div class="shelf-header">' +
          '<div class="shelf-header-left">' +
            '<span class="shelf-name">' + freqLabel + '</span>' +
            '<span class="shelf-count">' + freqReports.length + '편</span>' +
          '</div>' +
          '<button class="shelf-more" data-freq="' + freq + '">전체 보기 →</button>' +
        '</div>';

        // 가로 스크롤 카드 트랙
        html += '<div class="shelf-track">';
        displayReports.forEach(r => {
          // 같은 frequency에 여러 카테고리가 있으면 카드에 카테고리명 표시
          const cat = freqCats.find(c => c.id === r.categoryId);
          const catLabelHtml = freqCats.length > 1 && cat
            ? '<div class="shelf-card-cat">' + cat.name + '</div>'
            : '';

          // 태그 3개만
          const tagsHtml = (r.tags && r.tags.length > 0)
            ? '<div class="shelf-card-tags">' +
                r.tags.slice(0, 3).map(t => '<span class="shelf-card-tag">' + t + '</span>').join('') +
              '</div>'
            : '';

          html += '<div class="shelf-card" data-id="' + r.id + '">' +
            '<div class="shelf-card-date">' + fmtDate(r.date) + '</div>' +
            catLabelHtml +
            '<div class="shelf-card-title">' + r.title + '</div>' +
            tagsHtml +
          '</div>';
        });
        html += '</div>'; // .shelf-track

        html += '</div>'; // .shelf
      });

      // 보고서가 하나도 없는 경우
      if (html === '') {
        html = '<div class="empty" style="padding:80px 20px;">' +
          '<div class="empty-title">아직 보고서가 없습니다</div>' +
          '<div class="empty-desc">research-crawler에게 조사를 요청하면<br>자동으로 여기에 기록됩니다.</div>' +
        '</div>';
      }

      container.innerHTML = html;

      // "전체 보기" 클릭 → 대분류 상세 뷰 (세부 카테고리 목록)
      container.querySelectorAll('.shelf-more').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          openFreqGroup(btn.getAttribute('data-freq'));
        });
      });

      // 카드 클릭 → 보고서 뷰어 열기
      container.querySelectorAll('.shelf-card').forEach(card => {
        card.addEventListener('click', () => {
          const report = reports.find(r => r.id === card.getAttribute('data-id'));
          if (report) openReport(report, false);
        });
      });
    }

    // -----------------------------------------------
    // 대분류 상세 뷰 — 세부 카테고리 목록 (네이버 포스트 스타일)
    // -----------------------------------------------
    function openFreqGroup(freq) {
      const data = getData();
      const freqNames = { daily: 'Daily New', weekly: 'Weekly New', monthly: 'Monthly New', annual: 'Annual New' };
      const cats = (data.categories || []).filter(c => (c.frequency || 'annual').toLowerCase() === freq);
      const reports = data.reports || [];

      currentFreq = freq;
      currentCategoryId = null;

      if (pushHistoryState) {
        history.pushState({ view: 'freqGroup', freq: freq }, '', '#freq/' + freq);
      }

      // 헤더: 대분류 이름 + 전체 리포트 수
      const totalReports = reports.filter(r => cats.some(c => c.id === r.categoryId)).length;
      document.getElementById('freqGroupTitle').textContent = freqNames[freq] || freq;
      document.getElementById('freqGroupMeta').textContent = cats.length + '개 카테고리 · ' + totalReports + '편의 보고서';

      // 세부 카테고리 카드 렌더링
      const container = document.getElementById('freqGroupList');
      let html = '';

      cats.forEach(cat => {
        const catReports = reports
          .filter(r => r.categoryId === cat.id)
          .sort((a, b) => new Date(b.date) - new Date(a.date));
        const latestDate = catReports.length > 0 ? fmtDate(catReports[0].date) : '';

        html += '<div class="freq-cat-card" data-cat-id="' + cat.id + '">' +
          '<div class="freq-cat-left">' +
            '<div class="freq-cat-name">' + cat.name + '</div>' +
            (cat.description ? '<div class="freq-cat-desc">' + cat.description + '</div>' : '') +
          '</div>' +
          '<div class="freq-cat-right">' +
            '<span class="freq-cat-latest">' + latestDate + '</span>' +
            '<span class="freq-cat-count">' + catReports.length + '편</span>' +
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"></path></svg>' +
          '</div>' +
        '</div>';
      });

      container.innerHTML = html;

      // 카테고리 카드 클릭 → 타임라인 열기
      container.querySelectorAll('.freq-cat-card').forEach(card => {
        card.addEventListener('click', () => {
          openTimeline(card.getAttribute('data-cat-id'));
        });
      });

      showView('viewFreqGroup');
    }

    // -----------------------------------------------
    // 보고서 카드 렌더링 — 주요지표 배지 포함
    // -----------------------------------------------
    function renderArticleCards(containerId, reports, showCategory) {
      const data = getData();
      const container = document.getElementById(containerId);

      if (!reports || reports.length === 0) {
        container.innerHTML = '<div class="empty"><div class="empty-title">보고서가 없습니다</div></div>';
        return;
      }

      container.innerHTML = reports.map(r => {
        const cat = data.categories.find(c => c.id === r.categoryId);
        const colorClass = cat ? getCatColorClass() : '';

        // 카테고리 라벨 (전체 뷰일 때만 표시)
        const catHtml = showCategory && cat
          ? '<div class="article-card-cat ' + colorClass + '">' + cat.name + '</div>'
          : '';

        // 해시태그 목록
        const tagsHtml = r.tags && r.tags.length > 0
          ? '<div class="article-card-tags">' +
              r.tags.slice(0, 4).map(t =>
                '<span class="article-tag">' + t + '</span>'
              ).join('') +
            '</div>'
          : '';

        // 카드는 깔끔하게 타이틀 + 키워드 + 날짜만 표시
        return '<div class="article-card" data-id="' + r.id + '">' +
          catHtml +
          '<div class="article-card-title">' + r.title + '</div>' +
          tagsHtml +
          '<div class="article-card-footer">' +
            '<span class="article-card-date">' + fmtDate(r.date) + '</span>' +
          '</div>' +
        '</div>';
      }).join('');

      // 카드 클릭 → 보고서 뷰어 열기
      container.querySelectorAll('.article-card').forEach(card => {
        card.addEventListener('click', () => {
          const report = reports.find(r => r.id === card.getAttribute('data-id'));
          openReport(report, false);
        });
      });
    }

    // -----------------------------------------------
    // 타임라인 (카테고리별 보고서 목록)
    // -----------------------------------------------
    function openTimeline(categoryId) {
      const data = getData();
      const cat = data.categories.find(c => c.id === categoryId);
      if (!cat) return;

      currentCategoryId = categoryId;
      // 이 카테고리가 속한 대분류를 기억 (뒤로가기 시 대분류 뷰로 돌아가기 위해)
      currentFreq = (cat.frequency || 'annual').toLowerCase();
      openedFromSearch = false;

      if (pushHistoryState) {
        history.pushState({ view: 'timeline', categoryId: categoryId }, '', '#cat/' + categoryId);
      }

      // 사이드바 선택 상태 업데이트
      updateSidebarActive(categoryId);

      // 뒤로가기 버튼 텍스트를 대분류명으로 표시
      const freqNames = { daily: 'Daily New', weekly: 'Weekly New', monthly: 'Monthly New', annual: 'Annual New' };
      document.getElementById('backToHome').innerHTML =
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
          '<path d="M19 12H5M12 5l-7 7 7 7"></path>' +
        '</svg> ' + (freqNames[currentFreq] || '전체 목록');

      const colorValue = getCatColorValue();
      document.getElementById('timelineName').innerHTML =
        '<span class="timeline-color-dot" style="background:' + colorValue + '"></span>' +
        cat.name;

      // 해당 카테고리 보고서 최신순 정렬
      const catReports = data.reports
        .filter(r => r.categoryId === categoryId)
        .sort((a, b) => new Date(b.date) - new Date(a.date));

      document.getElementById('timelineMeta').textContent = catReports.length + '편의 보고서';

      const container = document.getElementById('timelineList');

      if (catReports.length === 0) {
        container.innerHTML = '<div class="empty"><div class="empty-title">보고서가 없습니다</div></div>';
      } else {
        // 타임라인 아이템 렌더링 — 주요지표 배지 포함
        container.innerHTML = catReports.map(r => {
          // 주요지표 배지 — cat_003에만
          const metricsHtml = r.categoryId === 'cat_003' ? keyMetricsHtml(r) : '';

          return '<div class="timeline-item" data-id="' + r.id + '">' +
            '<div class="timeline-item-date">' +
              '<div class="timeline-item-period">' + (r.period || '') + '</div>' +
              '<div class="timeline-item-day">' + fmtDate(r.date) + '</div>' +
            '</div>' +
            '<div class="timeline-item-body">' +
              '<div class="timeline-item-title">' + r.title + '</div>' +
              '<div class="timeline-item-summary">' + (r.summary || '') + '</div>' +
              metricsHtml +
              '<div class="timeline-item-footer">' +
                sourcesHtml(r.sources) +
              '</div>' +
            '</div>' +
          '</div>';
        }).join('');

        // 타임라인 항목 클릭 → 보고서 뷰어
        container.querySelectorAll('.timeline-item').forEach(item => {
          item.addEventListener('click', () => {
            const report = catReports.find(r => r.id === item.getAttribute('data-id'));
            openReport(report, false);
          });
        });
      }

      showView('viewTimeline');
    }

    // -----------------------------------------------
    // 보고서 내비게이션 렌더링
    // viewerSummary 아래, reportIframe 위에 같은 카테고리 목록 표시
    // -----------------------------------------------
    function renderReportNav(report) {
      const data = getData();
      const cat = data.categories.find(c => c.id === report.categoryId);

      // 같은 카테고리 보고서를 날짜 최신순으로 정렬
      const catReports = data.reports
        .filter(r => r.categoryId === report.categoryId)
        .sort((a, b) => new Date(b.date) - new Date(a.date));

      const navEl = document.getElementById('reportNav');
      const navListEl = document.getElementById('reportNavList');
      const navTitleEl = document.getElementById('reportNavTitle');
      const prevBtn = document.getElementById('reportNavPrev');
      const nextBtn = document.getElementById('reportNavNext');

      // 보고서가 1개 이하면 내비게이션 숨김
      if (catReports.length <= 1) {
        navEl.style.display = 'none';
        return;
      }

      navEl.style.display = '';

      // 카테고리명 + 편수 표시
      navTitleEl.textContent = (cat ? cat.name : '') + ' · ' + catReports.length + '편';

      // 현재 보고서의 인덱스 (최신순 배열 기준)
      const currentIdx = catReports.findIndex(r => r.id === report.id);

      // 이전 버튼 (더 오래된 = 인덱스 큰 쪽)
      prevBtn.disabled = currentIdx >= catReports.length - 1;
      // 다음 버튼 (더 최신 = 인덱스 작은 쪽)
      nextBtn.disabled = currentIdx <= 0;

      // 이전/다음 클릭 이벤트
      prevBtn.onclick = () => {
        if (currentIdx < catReports.length - 1) {
          openReport(catReports[currentIdx + 1], false);
        }
      };
      nextBtn.onclick = () => {
        if (currentIdx > 0) {
          openReport(catReports[currentIdx - 1], false);
        }
      };

      // 보고서 목록 렌더링 — 현재 보고서 하이라이트
      navListEl.innerHTML = catReports.map((r, idx) => {
        const isCurrent = r.id === report.id;
        return '<div class="report-nav-item' + (isCurrent ? ' current' : '') + '" data-id="' + r.id + '">' +
          '<div class="report-nav-item-title">' + r.title + '</div>' +
          '<div class="report-nav-item-date">' + fmtDate(r.date) + '</div>' +
        '</div>';
      }).join('');

      // 목록 아이템 클릭 → 해당 보고서로 전환
      navListEl.querySelectorAll('.report-nav-item').forEach(item => {
        item.addEventListener('click', () => {
          const targetReport = catReports.find(r => r.id === item.getAttribute('data-id'));
          if (targetReport) openReport(targetReport, false);
        });
      });

      // 현재 보고서 아이템이 보이도록 가로 스크롤 이동
      const currentItem = navListEl.querySelector('.report-nav-item.current');
      if (currentItem) {
        currentItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }

    // -----------------------------------------------
    // 보고서 뷰어 열기
    // -----------------------------------------------
    function openReport(report, fromSearch) {
      if (!report) return;
      openedFromSearch = fromSearch;
      currentReportId = report.id;

      if (pushHistoryState) {
        history.pushState({ view: 'report', reportId: report.id }, '', '#report/' + report.id);
      }

      const data = getData();
      const cat = data.categories.find(c => c.id === report.categoryId);

      // 뷰어 헤더 업데이트
      document.getElementById('viewerTitle').textContent = report.title;
      document.getElementById('viewerMeta').textContent =
        fmtDate(report.date) + (cat ? ' · ' + cat.name : '') +
        (report.sources ? ' · 출처 ' + report.sources.total + '개' : '');

      // 뒤로가기 버튼 텍스트
      document.getElementById('backFromReportText').textContent =
        fromSearch ? '검색 결과로' : '목록으로';

      // 요약 포인트 넘버링 리스트 렌더링
      const summaryEl = document.getElementById('viewerSummary');
      if (report.summaryPoints && report.summaryPoints.length > 0) {
        let sumHtml = '<div class="viewer-summary-label">Summary</div>';
        sumHtml += '<ul class="viewer-summary-list">';
        report.summaryPoints.forEach((point, i) => {
          sumHtml += '<li><span class="sum-num">' + (i + 1) + '</span><span>' + point + '</span></li>';
        });
        sumHtml += '</ul>';
        summaryEl.innerHTML = sumHtml;
        summaryEl.style.display = '';
      } else {
        summaryEl.style.display = 'none';
      }

      // 같은 카테고리 보고서 내비게이션 렌더링
      renderReportNav(report);

      // 보고서 HTML 파일을 가져와서 페이지에 직접 삽입 (iframe 대신)
      // Shadow DOM으로 스타일 격리 — 리포트 CSS가 본체에 영향 안 줌
      const reportPath = report.folderPath
        ? report.folderPath + report.fileName
        : 'reports/' + report.fileName;
      const embedEl = document.getElementById('reportEmbed');

      // Shadow DOM 초기화 (최초 1회만 attach, 이후 재사용)
      if (!embedEl.shadowRoot) {
        embedEl.attachShadow({ mode: 'open' });
      }
      embedEl.shadowRoot.innerHTML = '<div style="padding:40px;text-align:center;color:#94a3b8;font-family:sans-serif;">로딩 중...</div>';

      fetch(reportPath)
        .then(res => res.text())
        .then(html => {
          // 리포트 HTML 파싱
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');

          // 리포트의 <link> 태그(폰트 등)와 <style> 태그 추출
          let headContent = '';
          doc.querySelectorAll('link[rel="stylesheet"], link[rel="preconnect"]').forEach(link => {
            headContent += link.outerHTML;
          });
          doc.querySelectorAll('style').forEach(s => {
            // body 스타일을 Shadow DOM의 :host로 변환 (폰트, 색상 등 적용)
            let css = s.textContent;
            css = css.replace(/\bbody\s*\{/g, ':host {');
            headContent += '<style>' + css + '</style>';
          });

          // 리포트 본문(body 안의 내용) 추출
          const bodyContent = doc.body ? doc.body.innerHTML : html;

          // Shadow DOM에 삽입 — 스타일이 완전 격리됨
          embedEl.shadowRoot.innerHTML = headContent + bodyContent;

          // 페이지 상단으로 스크롤
          window.scrollTo({ top: 0, behavior: 'smooth' });
        })
        .catch(() => {
          embedEl.shadowRoot.innerHTML = '<div style="padding:40px;text-align:center;color:#e53e3e;font-family:sans-serif;">보고서를 불러올 수 없습니다.</div>';
        });
      showView('viewReport');
    }

    // -----------------------------------------------
    // 인라인 검색 — 메인 영역에서 바로 검색하고 결과를 봄
    // -----------------------------------------------
    function handleInlineSearch(query) {
      // 검색 결과/일반 콘텐츠 영역 가져오기
      const resultsEl = document.getElementById('mainSearchResults');
      const dashboard = document.getElementById('homeDashboard');
      const clearBtn = document.getElementById('mainSearchClear');
      const kbdEl = document.getElementById('mainSearchKbd');
      const footerEl = document.querySelector('#viewHome .footer');

      if (!query || query.trim() === '') {
        // 검색어 없으면 → 대시보드 복원
        resultsEl.style.display = 'none';
        dashboard.style.display = '';
        if (footerEl) footerEl.style.display = '';
        clearBtn.style.display = 'none';
        kbdEl.style.display = '';
        return;
      }

      // 검색어 있으면 → 대시보드 숨기고 검색 결과 표시
      dashboard.style.display = 'none';
      if (footerEl) footerEl.style.display = 'none';
      resultsEl.style.display = 'block';
      clearBtn.style.display = 'flex';
      kbdEl.style.display = 'none';

      // 보고서 검색 — 제목/요약/태그/카테고리명에서 찾기
      const data = getData();
      const kw = query.trim().toLowerCase();

      let results = data.reports.filter(r => {
        const cat = data.categories.find(c => c.id === r.categoryId);
        return r.title.toLowerCase().includes(kw)
          || (r.summary || '').toLowerCase().includes(kw)
          || (r.tags || []).some(t => t.toLowerCase().includes(kw))
          || (cat && cat.name.toLowerCase().includes(kw));
      });

      const countEl = document.getElementById('mainSearchCount');

      if (results.length === 0) {
        countEl.textContent = '"' + query.trim() + '" 검색 결과가 없습니다';
        document.getElementById('mainSearchList').innerHTML =
          '<div class="empty" style="padding:40px 20px;">' +
            '<div class="empty-title" style="font-size:15px;">일치하는 보고서가 없습니다</div>' +
            '<div class="empty-desc">다른 키워드로 검색해보세요</div>' +
          '</div>';
        return;
      }

      countEl.textContent = '"' + query.trim() + '" — ' + results.length + '개의 보고서';
      renderArticleCards('mainSearchList', results, true);
    }

    // -----------------------------------------------
    // 이벤트 연결
    // -----------------------------------------------

    // 모바일 햄버거 버튼 → 사이드바 토글
    document.getElementById('menuBtn').addEventListener('click', toggleSidebar);

    // 오버레이 클릭 → 사이드바 닫기 (모바일 전용)
    document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

    // 로고 클릭 → 홈으로
    document.getElementById('navLogo').addEventListener('click', () => {
      currentCategoryId = null;
      activeFilter = 'all';
      closeSidebar();
      updateSidebarActive(null);
      // 인라인 검색도 초기화
      document.getElementById('mainSearchInput').value = '';
      handleInlineSearch('');
      history.pushState({ view: 'home' }, '', '#');
      showView('viewHome');
      renderHome();
    });

    // 인라인 검색 입력 → 실시간 검색
    document.getElementById('mainSearchInput').addEventListener('input', (e) => {
      handleInlineSearch(e.target.value);
    });

    // 인라인 검색 × 지우기 버튼
    document.getElementById('mainSearchClear').addEventListener('click', () => {
      document.getElementById('mainSearchInput').value = '';
      handleInlineSearch('');
      document.getElementById('mainSearchInput').focus();
    });

    // 키보드 단축키 — ESC: 검색 초기화, /: 인라인 검색 포커스
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        // ESC → 인라인 검색 중이면 검색 초기화
        const mainInput = document.getElementById('mainSearchInput');
        if (document.activeElement === mainInput && mainInput.value) {
          mainInput.value = '';
          handleInlineSearch('');
          mainInput.blur();
          return;
        }
        closeSidebar();
      }
      // / 키 → 인라인 검색으로 포커스 (입력 필드에 있을 때는 무시)
      if (e.key === '/' && !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
        e.preventDefault();
        // 홈 화면이 아니면 홈으로 먼저 이동
        const homeView = document.getElementById('viewHome');
        if (!homeView.classList.contains('active')) {
          currentCategoryId = null;
          activeFilter = 'all';
          updateSidebarActive(null);
          showView('viewHome');
          renderHome();
        }
        const input = document.getElementById('mainSearchInput');
        input.focus();
        input.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });

    // 대분류 상세에서 홈으로 뒤로가기
    document.getElementById('backFromFreq').addEventListener('click', () => {
      currentFreq = null;
      currentCategoryId = null;
      updateSidebarActive(null);
      history.pushState({ view: 'home' }, '', '#');
      showView('viewHome');
      renderHome();
    });

    // 타임라인에서 뒤로가기 — 대분류 뷰가 있으면 그리로, 없으면 홈으로
    document.getElementById('backToHome').addEventListener('click', () => {
      if (currentFreq) {
        openFreqGroup(currentFreq);
      } else {
        currentCategoryId = null;
        updateSidebarActive(null);
        showView('viewHome');
      }
    });

    // 보고서 뷰어에서 뒤로가기
    document.getElementById('backFromReport').addEventListener('click', () => {
      // 삽입된 리포트 내용 초기화 (메모리 해제)
      const embed = document.getElementById('reportEmbed');
      if (embed.shadowRoot) embed.shadowRoot.innerHTML = '';
      if (currentCategoryId) {
        showView('viewTimeline');
      } else {
        showView('viewHome');
      }
    });

    // -----------------------------------------------
    // 초기화
    // -----------------------------------------------
    function init() {
      // URL 해시로 직접 접근한 경우 처리
      const hash = window.location.hash;
      if (hash.startsWith('#freq/')) {
        const freq = hash.replace('#freq/', '');
        renderHome();
        pushHistoryState = false;
        openFreqGroup(freq);
        pushHistoryState = true;
        history.replaceState({ view: 'freqGroup', freq: freq }, '', hash);
        return;
      }
      if (hash.startsWith('#report/')) {
        const reportId = hash.replace('#report/', '');
        const data = getData();
        const report = data.reports.find(r => r.id === reportId);
        if (report) {
          renderHome();
          pushHistoryState = false;
          openReport(report, false);
          pushHistoryState = true;
          history.replaceState({ view: 'report', reportId: report.id }, '', hash);
          return;
        }
      }
      // 기본: 홈 화면
      history.replaceState({ view: 'home' }, '', window.location.pathname);
      renderHome();
    }

    // DOM 준비 후 초기화 (또는 이미 준비됐으면 바로 실행)
    document.addEventListener('DOMContentLoaded', init);
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      init();
    }
  </script>

</body>
