# =========================================================
# 투자 데일리 브리핑 자동 생성 워크플로우
# 매일 KST 08:00 (UTC 23:00 전날)에 GitHub 서버에서 실행
# → PC가 꺼져 있어도 자동으로 보고서 생성 + Firebase 배포
# =========================================================
name: 투자 데일리 브리핑 자동 생성

on:
  schedule:
    # 매일 KST 08:00 = UTC 23:00 (전날)
    - cron: "0 23 * * *"
  workflow_dispatch: # 수동 실행 버튼 (언제든지 즉시 실행 가능)

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 파일 커밋·푸시 권한
      issues: write    # 에러 발생 시 이슈 생성 권한

    steps:
      # 저장소 최신 코드 가져오기
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # KST 기준 날짜 정보 생성 (보고서 파일명·제목에 사용)
      - name: 날짜 설정 (KST 기준)
        id: date
        run: |
          # 한국 시간(KST, UTC+9) 기준으로 날짜 계산
          export TZ='Asia/Seoul'
          echo "today=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "month=$(date +%-m)" >> $GITHUB_OUTPUT
          echo "day=$(date +%-d)" >> $GITHUB_OUTPUT
          echo "file_date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          echo "date_tag=$(date +%-m)월$(date +%-d)일" >> $GITHUB_OUTPUT
          echo "오늘 날짜(KST): $(date)"

      # Firebase CLI 설치 (보고서 배포에 필요)
      - name: Node.js 및 Firebase CLI 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g firebase-tools

      # Claude가 뉴스 조사 → 보고서 생성 → 커밋 → Firebase 배포까지 한 번에 처리
      - name: Claude로 보고서 생성 + 배포
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--max-turns 50"
          show_full_output: true
          prompt: |
            오늘(${{ steps.date.outputs.today }}) 투자 데일리 브리핑을 자동 생성해줘.

            ## 1단계: 뉴스 조사 (WebSearch 사용)
            아래 4개 분야를 각각 검색해서 오늘자 핵심 이슈를 파악해줘.

            - 한국 주식: 전일 코스피/코스닥 마감지수, 외국인/기관 순매수·순매도, 주요 종목 이슈
            - 미국 주식: 뉴욕증시 마감(S&P500, 나스닥, 다우존스), 빅테크/AI 동향, 연준(Fed) 정책
            - 부동산: 서울 아파트 매매/전세 동향, 정책 변화, DSR/금리 이슈
            - 종합: 오늘 주목해야 할 글로벌 이슈, 리스크 요인

            ## 2단계: HTML 보고서 생성
            다음 조건에 맞춰 HTML 보고서를 작성해줘.

            - 파일명: investment-daily-${{ steps.date.outputs.file_date }}.html
            - 저장위치: 04_deepdig/03_투자데일리브리핑/report/
            - 제목: [${{ steps.date.outputs.date_tag }}]투자 데일리 브리핑
            - CSS 스타일: 04_deepdig/01_소비자앱서비스트렌드조사/report/consumer-app-usage-2025-20260227.html 과 완전히 동일한 스타일 사용
              (흰색 배경, Noto Sans KR 폰트, 브런치 스타일, 900px 최대 너비)
            - 내용 구성: 요약 박스 → 한국증시 → 미국증시 → 부동산 → 종합 전망 순서로
            - keyMetrics(주요지표): 코스피, 코스닥, 나스닥, 달러/원, 금, 주요종목 등 수치 포함

            ## 3단계: registry.js 업데이트
            04_deepdig/registry.js 파일의 reports 배열 맨 끝에 새 보고서 항목을 추가해줘.

            추가할 항목 형식:
            {
              id: "rpt_XXX",  // 기존 마지막 id에서 +1 (예: 마지막이 rpt_007이면 rpt_008)
              categoryId: "cat_003",
              title: "[${{ steps.date.outputs.date_tag }}]투자 데일리 브리핑",
              date: "${{ steps.date.outputs.today }}",
              period: "${{ steps.date.outputs.today }}",
              folderPath: "03_투자데일리브리핑/report/",
              fileName: "investment-daily-${{ steps.date.outputs.file_date }}.html",
              summary: "조사한 내용 기반으로 2-3문장 요약",
              summaryPoints: ["핵심 포인트 5개 배열"],
              sources: { total: N, gradeA: N, gradeB: N, gradeC: N },
              tags: ["관련 태그 10개"],
              keyMetrics: [
                { label: "코스피", value: "수치", change: "등락률", dir: "up|down|flat" },
                { label: "코스닥", value: "수치", change: "등락률", dir: "up|down|flat" },
                { label: "나스닥", value: "수치", change: "등락률", dir: "up|down|flat" },
                { label: "달러", value: "수치", change: "등락률", dir: "up|down|flat" },
                { label: "금", value: "수치", change: "등락률", dir: "up|down|flat" }
              ]
            }

            ## 4단계: Git 커밋 & 푸시
            Bash로 아래 명령 실행해줘:
            ```
            git config user.email "action@github.com"
            git config user.name "GitHub Actions"
            git add 04_deepdig/03_투자데일리브리핑/report/investment-daily-${{ steps.date.outputs.file_date }}.html
            git add 04_deepdig/registry.js
            git commit -m "Auto: [${{ steps.date.outputs.date_tag }}] 투자 데일리 브리핑 자동 생성"
            git push
            ```

            ## 5단계: Firebase 배포
            Bash로 아래 명령 실행해줘:
            ```
            firebase deploy --only hosting:deepdig --token "$FIREBASE_TOKEN" --project did-ads --non-interactive
            ```

            모든 단계가 완료되면 최종 결과를 간략히 요약해줘.
        env:
          # Firebase 배포 인증 토큰 (GitHub 시크릿에서 불러옴)
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
