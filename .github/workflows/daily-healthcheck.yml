# 매일 아침 10시(KST) 배포 사이트 헬스체크
name: Daily Healthcheck

on:
  schedule:
    # UTC 01:00 = KST 10:00
    - cron: "0 1 * * *"
  workflow_dispatch: # 수동 실행도 가능

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      issues: write
      id-token: write
    steps:
      # ── Step 1: 코드 체크아웃 ──
      - uses: actions/checkout@v4

      # ── Step 2: Claude AI 헬스체크 (메인) ──
      - name: Claude AI Healthcheck
        id: claude_check
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          prompt: |
            아래 사이트들의 헬스체크를 수행해줘:
            1. https://deepdig-app.web.app — DeepDig 리서치 아카이브
            2. https://pikbox-app.web.app — Pikbox 레퍼런스 컬렉터
            3. https://did-ad-manager.web.app — DID 광고 관리자

            각 사이트별로:
            - HTTP 상태 코드 확인
            - 페이지 로드 여부 확인
            - 주요 콘텐츠가 정상 표시되는지 확인

            결과를 표 형식으로 정리해줘.
          claude_args: "--allowedTools WebSearch,WebFetch,Bash --max-turns 5"

      # ── Step 3: Claude 실패 시 curl로 직접 헬스체크 (fallback) ──
      - name: Fallback curl healthcheck
        id: curl_check
        if: steps.claude_check.outcome == 'failure'
        run: |
          echo "⚠️ Claude 헬스체크 실패 — curl fallback 실행"
          FAILED_SITES=""
          REPORT=""

          # 체크할 사이트 목록
          SITES=(
            "https://deepdig-app.web.app|DeepDig"
            "https://pikbox-app.web.app|Pikbox"
            "https://did-ad-manager.web.app|DID광고관리자"
          )

          for entry in "${SITES[@]}"; do
            URL="${entry%%|*}"
            NAME="${entry##*|}"
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 "$URL" || echo "000")

            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              REPORT="${REPORT}| ${NAME} | ${URL} | ✅ ${STATUS} |\n"
            else
              REPORT="${REPORT}| ${NAME} | ${URL} | ❌ ${STATUS} |\n"
              FAILED_SITES="${FAILED_SITES}${NAME}(${STATUS}) "
            fi
          done

          echo -e "\n## 헬스체크 결과 (curl fallback)\n"
          echo "| 사이트 | URL | 상태 |"
          echo "|--------|-----|------|"
          echo -e "$REPORT"

          # 후속 step에서 사용할 수 있도록 output 저장
          echo "failed_sites=${FAILED_SITES}" >> "$GITHUB_OUTPUT"
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$REPORT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # ── Step 4: 문제 발견 시 GitHub Issue 자동 생성 ──
      - name: Create issue on failure
        if: steps.curl_check.outcome == 'success' && steps.curl_check.outputs.failed_sites != ''
        uses: actions/github-script@v7
        with:
          script: |
            const failedSites = '${{ steps.curl_check.outputs.failed_sites }}'.trim();
            const today = new Date().toISOString().split('T')[0];

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 [${today}] 사이트 다운 감지: ${failedSites}`,
              body: [
                `## 헬스체크 실패 보고`,
                ``,
                `**일시**: ${new Date().toISOString()}`,
                `**감지 방법**: Claude 실패 → curl fallback`,
                ``,
                `### 장애 사이트`,
                `${failedSites}`,
                ``,
                `### 전체 결과`,
                `| 사이트 | URL | 상태 |`,
                `|--------|-----|------|`,
                `${{ steps.curl_check.outputs.report }}`,
                ``,
                `### 조치 필요`,
                `- [ ] Firebase Hosting 콘솔 확인`,
                `- [ ] 도메인/DNS 설정 확인`,
                `- [ ] 배포 상태 확인 (\`firebase hosting:channel:list\`)`,
                ``,
                `> 🤖 이 이슈는 Daily Healthcheck 워크플로우에 의해 자동 생성되었습니다.`
              ].join('\n'),
              labels: ['healthcheck', 'bug']
            });
