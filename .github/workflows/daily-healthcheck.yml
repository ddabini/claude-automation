# 매일 아침 10시(KST) 배포 사이트 헬스체크
name: Daily Healthcheck

permissions:
  contents: write
  issues: write
  id-token: write

on:
  schedule:
    # UTC 01:00 = KST 10:00
    - cron: "0 1 * * *"
  workflow_dispatch: # 수동 실행도 가능

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            아래 사이트들의 헬스체크를 수행해줘:
            1. https://deepdig-app.web.app — DeepDig 리서치 아카이브
            2. https://pikbox-app.web.app — Pikbox 레퍼런스 컬렉터
            3. https://did-ad-manager.web.app — DID 광고 관리자

            각 사이트별로:
            - HTTP 상태 코드 확인
            - 페이지 로드 여부 확인
            - 주요 콘텐츠가 정상 표시되는지 확인

            결과를 표 형식으로 정리하고, 문제가 있으면 GitHub Issue를 생성해줘.
          claude_args: "--max-turns 5"
