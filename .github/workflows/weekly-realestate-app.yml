# =========================================================
# 부동산 앱서비스 분석 위클리 자동 생성 워크플로우
# 매주 금요일 KST 09:00 (UTC 00:00 금요일)에 GitHub 서버에서 실행
# → PC가 꺼져 있어도 자동으로 보고서 생성 + Firebase 배포
# Gemini API + Google Search Grounding으로 보고서 자동 생성
# 카테고리: cat_004 (부동산 앱서비스 분석)
# =========================================================
name: 부동산 앱서비스 분석 위클리 자동 생성

on:
  schedule:
    # 매주 금요일 KST 09:00 = UTC 00:00 금요일
    - cron: "0 0 * * 5"
  workflow_dispatch: # 수동 실행 버튼 (언제든지 즉시 실행 가능)

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 파일 커밋·푸시 권한
      issues: write    # 에러 발생 시 이슈 생성 권한

    steps:
      # 저장소 최신 코드 가져오기
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # KST 기준 날짜·주차 정보 생성 (보고서 파일명·제목에 사용)
      - name: 날짜 설정 (KST 기준)
        id: date
        run: |
          # 한국 시간(KST, UTC+9) 기준으로 날짜·주차 계산
          export TZ='Asia/Seoul'
          echo "today=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "date_tag=$(date +%-m)월$(date +%-d)일" >> $GITHUB_OUTPUT
          # 해당 월의 몇 번째 주인지 계산 (제목용)
          WEEK_NUM=$(( ($(date +%-d) - 1) / 7 + 1 ))
          echo "week_tag=$(date +%-m)월${WEEK_NUM}주차" >> $GITHUB_OUTPUT
          echo "오늘 날짜(KST): $(date)"

      # Node.js 20 설치 (스크립트 실행에 필요)
      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # generate-report.mjs가 사용하는 npm 패키지 설치
      - name: 스크립트 의존성 설치
        run: cd scripts && npm install

      # Anthropic API로 부동산 앱 동향 조사 → HTML 보고서 생성 → registry.js 업데이트
      - name: 보고서 생성
        id: report
        timeout-minutes: 10
        run: node scripts/generate-report.mjs --type weekly-realestate --date ${{ steps.date.outputs.today }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Firebase CLI 설치 (배포에 필요)
      - name: Firebase CLI 설치
        run: npm install -g firebase-tools

      # 생성된 보고서 파일 + registry.js를 커밋하고 원격 저장소에 푸시
      - name: Git 커밋 & 푸시
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add "04_deepdig/"
          git diff --cached --quiet || git commit -m "Auto: [${{ steps.date.outputs.week_tag }}] 부동산 앱서비스 위클리"
          git push

      # Firebase Hosting에 최신 보고서 배포
      - name: Firebase 배포
        run: firebase deploy --only hosting:deepdig --token "$FIREBASE_TOKEN" --project did-ads --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # 위 단계 중 하나라도 실패하면 GitHub Issue로 알림 생성
      - name: 실패 시 GitHub Issue 자동 생성
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = '${{ steps.date.outputs.today }}';
            const weekTag = '${{ steps.date.outputs.week_tag }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[자동알림] 부동산 앱서비스 위클리 생성 실패 (${weekTag})`,
              body: [
                `## 부동산 앱서비스 위클리 자동 생성 실패`,
                ``,
                `- **날짜**: ${today}`,
                `- **주차**: ${weekTag}`,
                `- **실행 로그**: [Actions Run #${context.runId}](${runUrl})`,
                ``,
                `### 확인 사항`,
                `- [ ] \`ANTHROPIC_API_KEY\` 시크릿이 유효한지 확인`,
                `- [ ] \`FIREBASE_TOKEN\` 시크릿이 만료되지 않았는지 확인`,
                `- [ ] \`scripts/generate-report.mjs\` 스크립트 정상 동작 확인`,
                `- [ ] 워크플로우 타임아웃(10분)에 걸린 것은 아닌지 확인`,
                ``,
                `> 이 이슈는 GitHub Actions 워크플로우에서 자동 생성되었습니다.`
              ].join('\n'),
              labels: ['bug', 'automated']
            });
